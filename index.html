<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PiggyBank">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PiggyBank</title>
<style>
:root{
  --p:#542916;--p2:#7a3d22;--s:#b79858;--acc:#a13a1e;
  --bleu:#88b8ce;--bg:#fefaf0;--card:#ffffff;
  --text:#2c1a0e;--muted:#7a5c3e;--border:rgba(84,41,22,0.13);
  --success:#2d7a4f;--danger:#a13a1e;--miel:#f1c166;
  --surface:#fff8f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.sans{font-family:'Helvetica Neue',sans-serif}

/* ── OFFLINE ── */
#offline-banner{position:fixed;top:0;left:0;right:0;background:var(--danger);color:#fff;text-align:center;font-size:12px;padding:6px 12px;z-index:9999;display:none;font-family:'Helvetica Neue',sans-serif}
#offline-banner.show{display:block}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ── LOGIN ── */
#screen-login{background:linear-gradient(160deg,var(--p) 0%,var(--p2) 50%,var(--acc) 100%);align-items:center;justify-content:center}
.login-inner{display:flex;flex-direction:column;align-items:center;gap:32px;padding:40px 24px;width:100%;max-width:320px}
.login-title{font-size:38px;color:var(--bg);letter-spacing:2px;text-align:center}
.login-sub{font-size:11px;color:rgba(254,250,240,0.55);letter-spacing:3px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;margin-top:-20px}
#google-btn-container{min-height:44px;display:flex;align-items:center;justify-content:center;width:280px}
#login-loading{color:rgba(254,250,240,0.5);font-size:12px;font-family:'Helvetica Neue',sans-serif}

/* ── ONBOARDING ── */
#screen-onboarding{background:var(--surface);overflow-y:auto}
.ob-container{padding:20px 20px 48px;max-width:420px;margin:0 auto}
.ob-progress{height:3px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden}
.ob-progress-fill{height:100%;border-radius:2px;background:var(--p);transition:width 0.4s}
.ob-step-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin-bottom:8px}
.ob-title{font-size:24px;color:var(--p);margin-bottom:20px}
.ob-back{background:none;border:none;color:var(--muted);font-size:13px;font-family:'Helvetica Neue',sans-serif;cursor:pointer;margin-bottom:16px;padding:0}
.avatar-upload{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:24px}
.avatar-circle{width:88px;height:88px;border-radius:50%;border:2.5px dashed var(--s);background:rgba(183,152,88,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
.avatar-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--s);font-size:11px;font-family:'Helvetica Neue',sans-serif}
.avatar-placeholder span{font-size:24px}
.avatar-hint{font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif}
.ob-name-input{border:none;border-bottom:2.5px solid var(--s);background:transparent;font-size:26px;font-family:'Georgia',serif;color:var(--text);width:100%;padding:6px 0;outline:none;text-align:center;margin-bottom:4px}
.ob-name-input::placeholder{color:var(--border)}
.ob-name-hint{text-align:center;font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;margin-bottom:24px}
.ob-income-display{font-size:36px;font-family:'Georgia',serif;color:var(--text);border-bottom:2.5px solid var(--s);text-align:center;width:100%;padding:8px 0;outline:none;margin-bottom:6px;background:transparent;border-top:none;border-left:none;border-right:none}
.ob-income-hint{text-align:center;font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;margin-bottom:24px}
.total-card{background:rgba(183,152,88,0.1);border:1px solid rgba(183,152,88,0.3);border-radius:12px;padding:12px 16px;margin-bottom:16px}
.tc-row{display:flex;justify-content:space-between;font-size:12px;font-family:'Helvetica Neue',sans-serif;padding:3px 0}
.tc-label{color:var(--muted)}
.tc-val{font-weight:700;color:var(--text)}
.tc-val.ok{color:var(--success)}
.tc-val.neg{color:var(--danger)}
.tc-div{height:1px;background:var(--border);margin:6px 0}
.chip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.chip-big{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 4px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);font-size:11px;font-family:'Helvetica Neue',sans-serif;color:var(--muted);cursor:pointer;position:relative;min-height:80px}
.chip-big .ce{font-size:22px}
.chip-big .cn{font-size:11px;text-align:center;line-height:1.3}
.chip-big .ca{font-size:10px;font-weight:700;color:var(--s)}
.chip-big.active{border-color:var(--s);background:rgba(183,152,88,0.1);color:var(--p)}
.chip-big .chip-del{position:absolute;top:4px;right:6px;font-size:11px;color:var(--muted)}
.chip-add{border-style:dashed;color:var(--s)}
.chip-add .ce{color:var(--s)}
.ob-btn{width:100%;background:var(--p);color:var(--bg);border:none;border-radius:12px;padding:15px;font-size:15px;font-family:'Georgia',serif;cursor:pointer;margin-top:8px}
.ob-btn:active{background:var(--acc)}
.sum-section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin:14px 0 8px}
.sum-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.sum-chip{display:inline-flex;flex-direction:column;align-items:center;gap:2px;background:rgba(183,152,88,0.08);border:1px solid rgba(183,152,88,0.2);border-radius:10px;padding:7px 10px;font-family:'Helvetica Neue',sans-serif}
.sum-chip .sce{font-size:16px}
.sum-chip .scn{font-size:10px;color:var(--muted)}
.sum-chip .sca{font-size:10px;font-weight:700;color:var(--s)}
.profile-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.profile-avatar{width:56px;height:56px;border-radius:50%;border:2px solid var(--s);object-fit:cover;background:rgba(183,152,88,0.12);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}

/* ── RESTRICTED ── */
#screen-restricted{background:linear-gradient(160deg,var(--p) 0%,var(--p2) 50%,var(--acc) 100%);align-items:center;justify-content:center}
.restricted-inner{display:flex;flex-direction:column;align-items:center;gap:24px;padding:40px 24px;width:100%;max-width:320px;text-align:center}
.google-btn{display:flex;align-items:center;gap:12px;background:var(--bg);border:none;border-radius:14px;padding:16px 24px;cursor:pointer;width:100%;font-size:15px;font-family:'Helvetica Neue',sans-serif;color:var(--text);font-weight:600;justify-content:center}

/* ── HOME ── */
#screen-home{background:linear-gradient(160deg,var(--p) 0%,var(--p2) 50%,var(--acc) 100%);align-items:center;justify-content:center;position:relative;overflow:hidden}
#screen-home::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.04)}
#screen-home::after{content:'';position:absolute;bottom:-80px;left:-40px;width:280px;height:280px;border-radius:50%;background:rgba(183,152,88,0.08)}
.home-inner{display:flex;flex-direction:column;align-items:center;gap:40px;padding:40px 24px;width:100%;position:relative;z-index:1}
.home-title{font-size:36px;color:var(--bg);letter-spacing:2px}
.home-sub{font-size:11px;color:rgba(254,250,240,0.5);letter-spacing:3px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif}
.home-accounts{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
.account-btn{border:none;border-radius:16px;padding:18px 20px;cursor:pointer;text-align:left;transition:transform 0.15s;position:relative;overflow:hidden;width:100%;display:flex;align-items:center;gap:14px}
.account-btn:active{transform:scale(0.97)}
.account-btn.casa{background:var(--bg)}
.account-btn.personal{background:var(--bleu)}
.acc-avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;object-fit:cover}
.acc-avatar.casa-av{background:rgba(84,41,22,0.1)}
.acc-avatar.personal-av{background:rgba(255,255,255,0.3)}
.acc-info{flex:1}
.acc-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;opacity:0.55;margin-bottom:2px}
.account-btn.casa .acc-label{color:var(--muted)}
.account-btn.personal .acc-label{color:#1a3f52}
.acc-name{font-size:20px}
.account-btn.casa .acc-name{color:var(--p)}
.account-btn.personal .acc-name{color:#1a3f52}
.acc-sub{font-size:11px;font-family:'Helvetica Neue',sans-serif;opacity:0.6;margin-top:2px}
.account-btn.casa .acc-sub{color:var(--muted)}
.account-btn.personal .acc-sub{color:#2a5a72}
.acc-arrow{font-size:20px;opacity:0.25;flex-shrink:0}
.pending-badge{position:absolute;top:12px;right:40px;background:var(--miel);color:#3a1a0d;font-size:10px;font-family:'Helvetica Neue',sans-serif;font-weight:700;padding:2px 7px;border-radius:20px;display:none}
.pending-badge.show{display:block}

/* ── APP ── */
#screen-app{background:var(--surface)}
.app-header{background:var(--p);padding:14px 18px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:10px}
.back-btn{background:rgba(255,255,255,0.12);border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--bg);font-size:20px;flex-shrink:0}
.back-btn:active{background:rgba(255,255,255,0.22)}
.header-av{width:30px;height:30px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,0.15);flex-shrink:0}
.header-av img{width:100%;height:100%;object-fit:cover}
.header-info{flex:1}
.header-name{font-size:16px;color:var(--bg)}
.header-month{font-size:11px;color:rgba(254,250,240,0.5);font-family:'Helvetica Neue',sans-serif}
.sync-pill{border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;font-family:'Helvetica Neue',sans-serif;flex-shrink:0;border:none;letter-spacing:0.5px}
.sync-online{background:rgba(77,220,138,0.2);color:#4ddc8a;border:1px solid rgba(77,220,138,0.3)}
.sync-offline{background:rgba(241,193,102,0.2);color:var(--miel);border:1px solid rgba(241,193,102,0.4);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ── NAV TABS ── */
.nav-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:99}
.nav-tab{flex:1;padding:11px 4px;border:none;background:none;cursor:pointer;font-size:11px;font-family:'Helvetica Neue',sans-serif;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:0.3px}
.nav-tab.active{color:var(--p);border-bottom-color:var(--s);font-weight:700}
.tab-panel{display:none;padding:14px 14px 88px}
.tab-panel.active{display:block}

/* ── INICIO — CAT CHIPS ── */
.cat-chips-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cc{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px 12px;cursor:pointer;transition:transform 0.15s;position:relative;-webkit-tap-highlight-color:transparent}
.cc:active{transform:scale(0.97)}
.cc.over{border-color:rgba(161,58,30,0.25);background:#fff8f6}
.cc.warn-chip{border-color:rgba(241,193,102,0.4)}
.cc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cc-emoji{font-size:24px}
.cc-balance{font-size:12px;font-weight:700;font-family:'Helvetica Neue',sans-serif}
.cc-balance.ok{color:var(--success)}
.cc-balance.warn{color:#e07b00}
.cc-balance.over{color:var(--danger)}
.cc-name{font-size:12px;color:var(--text);margin-bottom:7px;font-family:'Helvetica Neue',sans-serif;font-weight:600}
.cc-prog{height:4px;background:rgba(84,41,22,0.08);border-radius:2px;overflow:hidden;margin-bottom:7px}
.cc-prog-fill{height:100%;border-radius:2px;background:var(--s);transition:width 0.4s}
.cc-prog-fill.warn{background:var(--miel)}
.cc-prog-fill.over{background:var(--danger)}
.cc-amounts{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'Helvetica Neue',sans-serif}
.cc-spent{font-weight:600;color:var(--p)}

/* ── GASTOS LIST ── */
.eg-header{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin-bottom:8px;margin-top:16px;padding-left:2px}
.eg-header:first-child{margin-top:0}
.expense-item{background:var(--card);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px;border:1px solid var(--border);position:relative}
.expense-item.pending-sync{border-left:3px solid var(--miel)}
.ei-icon{width:38px;height:38px;border-radius:10px;background:rgba(183,152,88,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ei-info{flex:1;min-width:0}
.ei-desc{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ei-meta{font-size:10px;color:var(--muted);font-family:'Helvetica Neue',sans-serif}
.ei-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ei-amount{font-size:14px;color:var(--acc);font-weight:600;font-family:'Helvetica Neue',sans-serif}
.ei-pago{font-size:9px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;background:rgba(84,41,22,0.06);padding:2px 6px;border-radius:8px}
.sync-dot{position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--miel)}
.pending-banner{background:rgba(241,193,102,0.12);border:1px solid rgba(241,193,102,0.35);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:none;align-items:center;gap:8px;font-size:12px;font-family:'Helvetica Neue',sans-serif;color:var(--p)}
.pending-banner.show{display:flex}

/* ── RESUMEN ── */
.res-balance{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.rb{background:var(--p);border-radius:12px;padding:12px}
.rb-label{font-size:9px;color:rgba(254,250,240,0.5);letter-spacing:1.5px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;margin-bottom:4px}
.rb-val{font-size:16px;color:var(--bg)}
.rb-val.green{color:#7ff0b0}
.rb-val.warn{color:var(--miel)}
.res-section{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin:16px 0 10px}
.res-cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-family:'Helvetica Neue',sans-serif}
.res-cat-emoji{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.res-cat-name{font-size:12px;color:var(--text);width:80px;flex-shrink:0}
.res-cat-bar{flex:1;height:6px;background:rgba(84,41,22,0.08);border-radius:3px;overflow:hidden}
.res-cat-fill{height:100%;border-radius:3px;background:var(--s)}
.res-cat-fill.over{background:var(--danger)}
.res-cat-fill.warn{background:var(--miel)}
.res-cat-amt{font-size:11px;color:var(--muted);width:52px;text-align:right;flex-shrink:0}
.pago-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:8px}
.pago-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-family:'Helvetica Neue',sans-serif;font-size:13px}
.pago-row:last-child{border:none}
.pago-label{color:var(--muted)}
.pago-val{font-weight:700;color:var(--p)}

/* ── METAS ── */
.meta-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px}
.mc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mc-emoji{font-size:24px}
.mc-info{flex:1}
.mc-name{font-size:14px;font-weight:600;color:var(--text)}
.mc-sub{font-size:11px;color:var(--muted);margin-top:1px;font-family:'Helvetica Neue',sans-serif}
.mc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;font-family:'Helvetica Neue',sans-serif}
.badge-ok{background:rgba(45,122,79,0.1);color:var(--success)}
.badge-warn{background:rgba(241,193,102,0.15);color:#b87000}
.badge-over{background:rgba(161,58,30,0.1);color:var(--danger)}
.mc-prog{height:7px;background:rgba(84,41,22,0.08);border-radius:4px;overflow:hidden;margin-bottom:8px}
.mc-prog-fill{height:100%;border-radius:4px;background:var(--p);transition:width 0.5s}
.mc-prog-fill.green{background:var(--success)}
.mc-prog-fill.warn{background:var(--miel)}
.mc-prog-fill.over{background:var(--danger)}
.mc-nums{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif}
.mc-nums span:first-child{color:var(--p);font-weight:700}
.mc-detail{background:rgba(183,152,88,0.08);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:11px;color:var(--p);line-height:1.6;font-family:'Helvetica Neue',sans-serif}
.metas-type-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.metas-type-tabs::-webkit-scrollbar{display:none}
.mtype-tab{border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--muted);background:var(--card);cursor:pointer;white-space:nowrap;font-family:'Helvetica Neue',sans-serif}
.mtype-tab.active{background:var(--p);color:var(--bg);border-color:var(--p);font-weight:700}

/* ── FAB & SETTINGS ── */
.fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--p);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;font-size:26px;color:var(--bg);box-shadow:0 4px 20px rgba(84,41,22,0.4);transition:transform 0.2s}
.fab:active{transform:scale(0.9);background:var(--acc)}
.settings-btn{position:fixed;bottom:92px;right:30px;width:40px;height:40px;border-radius:50%;background:rgba(84,41,22,0.07);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;font-size:17px;color:var(--muted)}

/* ── MODALES ── */
.modal-overlay{position:fixed;inset:0;background:rgba(20,8,2,0.6);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:24px 20px 48px;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}
.modal-title{font-size:20px;color:var(--p);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:16px;font-family:'Georgia',serif;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s;appearance:none}
.form-input:focus{border-color:var(--s)}
.amount-input{font-size:32px;text-align:center;border:none;border-bottom:2.5px solid var(--s);border-radius:0;background:transparent;padding:8px 0}
.amount-input:focus{border-color:var(--p)}
.cat-grid-modal{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cat-chip-m{border:1.5px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;font-size:11px;font-family:'Helvetica Neue',sans-serif;color:var(--muted);background:var(--bg);transition:all 0.15s;line-height:1.4}
.cat-chip-m .ce{font-size:19px;display:block;margin-bottom:3px}
.cat-chip-m.selected{border-color:var(--s);background:rgba(183,152,88,0.1);color:var(--p);font-weight:600}
.pago-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pago-chip{border:1.5px solid var(--border);border-radius:10px;padding:9px 4px;text-align:center;cursor:pointer;font-size:11px;font-family:'Helvetica Neue',sans-serif;color:var(--muted);background:var(--bg);transition:all 0.15s}
.pago-chip.selected{border-color:var(--s);background:rgba(183,152,88,0.1);color:var(--p);font-weight:600}
.btn-submit{width:100%;background:var(--p);color:var(--bg);border:none;border-radius:12px;padding:15px;font-size:15px;font-family:'Georgia',serif;cursor:pointer;margin-top:8px;transition:background 0.2s}
.btn-submit:active{background:var(--acc)}
.btn-submit:disabled{background:#aaa;cursor:not-allowed}
.btn-secondary{width:100%;background:transparent;color:var(--p);border:1.5px solid var(--p);border-radius:12px;padding:13px;font-size:14px;font-family:'Helvetica Neue',sans-serif;cursor:pointer;margin-top:8px}

/* ── SETTINGS ── */
#screen-settings{background:var(--surface)}
.settings-header{background:var(--p);padding:14px 18px 16px}
.settings-section{padding:14px 18px;border-bottom:1px solid var(--border)}
.settings-title{font-size:12px;font-weight:700;color:var(--p);font-family:'Helvetica Neue',sans-serif;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase}
.theme-grid-s{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.theme-card-s{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent}
.theme-card-s.sel{border-color:var(--p)}
.tc-swatches-s{display:flex;height:28px}
.tc-swatch-s{flex:1}
.tc-body-s{padding:6px 8px;background:var(--card)}
.tc-name-s{font-size:11px;font-weight:600;color:var(--text);font-family:'Helvetica Neue',sans-serif}

/* ── MISC ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.es-emoji{font-size:36px;margin-bottom:10px}
.es-text{font-size:13px;font-family:'Helvetica Neue',sans-serif;line-height:1.6}
.loading-state{text-align:center;padding:40px 20px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;font-size:13px}
.loading-spin{font-size:26px;display:block;margin-bottom:10px;animation:spin 1.2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e0c04;color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-family:'Helvetica Neue',sans-serif;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.add-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px dashed var(--border);border-radius:10px;cursor:pointer;margin-top:4px;font-family:'Helvetica Neue',sans-serif;font-size:13px;color:var(--muted)}
.add-row-icon{width:28px;height:28px;border-radius:7px;background:rgba(183,152,88,0.12);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--s)}
</style>
</head>

<script>
// ════════════════════════════════════════════════════════════
// CONSTANTES
// ════════════════════════════════════════════════════════════
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycby4IA__Z1rmcwSQfOOF1QDmu9o47RqXlrKD010k-kN8CJNckqiSIjH6wb6NPYuVLyX7WQ/exec';
const TOKEN        = 'Theend.01';
const ADMIN_EMAILS = ['fabriciouriasg@gmail.com','vanessav2122@gmail.com'];
const GOOGLE_CLIENT_ID = '142679968235-ij3dcqsqkpu5bdvfb0gfimh3ami6frgq.apps.googleusercontent.com';

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const DEFAULT_CATS = [
  {id:'despensa', l:'Despensa',  e:'🛒', b:6000},

  {id:'gym',       l:'Gym',           e:'💪', monto:700},
  {id:'subs',      l:'Suscripciones', e:'📱', monto:600},
  {id:'seguros',   l:'Seguros',       e:'🛡️', monto:800}
];

const DEFAULT_PAGOS = ['HSBC','Invex','Efectivo'];

const THEMES = [
  {id:'mayne',    name:'Mayne',          swatches:['#542916','#b79858','#a13a1e','#88b8ce','#fefaf0'], p:'#542916',s:'#b79858',acc:'#a13a1e',bg:'#fefaf0'},
  {id:'sage',     name:'Sage & Sand',    swatches:['#4a7c6f','#6aab99','#e8b86d','#f5efe6','#d4614a'], p:'#4a7c6f',s:'#6aab99',acc:'#e8b86d',bg:'#f5efe6'},
  {id:'sky',      name:'Sky & Peach',    swatches:['#3a7bd5','#6aaee8','#f4956a','#fef6f0','#e85d5d'], p:'#3a7bd5',s:'#6aaee8',acc:'#f4956a',bg:'#fef6f0'},
  {id:'lavender', name:'Lavender & Mint',swatches:['#7c6faa','#a89fd4','#5dbea3','#f4f0fb','#e06b8b'], p:'#7c6faa',s:'#a89fd4',acc:'#5dbea3',bg:'#f4f0fb'},
  {id:'forest',   name:'Forest & Amber', swatches:['#2d6a4f','#52b788','#f4a261','#f8f4e8','#e76f51'], p:'#2d6a4f',s:'#52b788',acc:'#f4a261',bg:'#f8f4e8'},
  {id:'ocean',    name:'Deep Ocean',     swatches:['#0a4f6e','#1a8fa8','#40c8d4','#e8f7fa','#e05c3a'], p:'#0a4f6e',s:'#1a8fa8',acc:'#40c8d4',bg:'#e8f7fa'},
  {id:'clearsky', name:'Clear Sky',      swatches:['#5b9bd5','#90c4f0','#ffd166','#f0f8ff','#ff6b6b'], p:'#5b9bd5',s:'#90c4f0',acc:'#ffd166',bg:'#f0f8ff'},
  {id:'codec',    name:'Codec',          swatches:['#0a0f0a','#1a2e1a','#4aff91','#0d1a0d','#ff3a3a'], p:'#0d1a0d',s:'#1a2e1a',acc:'#4aff91',bg:'#0a0f0a'}
];

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let currentUser = null;
let currentAcct = null;
let userConfig  = null;
let gastosMes   = [];
let budgets     = {};
let isOnline    = navigator.onLine;
let activeTab   = 'inicio';
let obStep      = 1;
let obData      = {};
let editFijoIdx = null;
let editCatIdx  = null;
let preselCat   = null;

// ── Storage helpers ──
const sk  = k  => `pb_${k}`;
const gls = k  => { try { return JSON.parse(localStorage.getItem(sk(k))); } catch { return null; }};
const sls = (k,v) => localStorage.setItem(sk(k), JSON.stringify(v));
const gq  = a  => { try { return JSON.parse(localStorage.getItem(`pb_q_${a}`) || '[]'); } catch { return []; }};
const sq  = (a,d) => localStorage.setItem(`pb_q_${a}`, JSON.stringify(d));
const uid = ()  => `exp_${Date.now().toString(36)}_${Math.random().toString(36).substr(2,6)}`;

// ── Format helpers ──
const fmxn   = n  => '$' + Math.round(n).toLocaleString('es-MX');
const fday   = d  => `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()].substr(0,3)}`;
const fmonth = d  => `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
const today  = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const getMesNombre = () => MONTHS[new Date().getMonth()] + ' ' + new Date().getFullYear();
const getCats = () => currentAcct==='casa' ? DEFAULT_CATS : (userConfig?.categorias?.filter(c=>c.active!==false) || DEFAULT_CATS);
const getCat  = id => getCats().find(c=>c.id===id) || {e:'📌',l:id,b:0};
const getPagos= () => currentAcct==='casa' ? DEFAULT_PAGOS : (userConfig?.pagos || DEFAULT_PAGOS);

// ════════════════════════════════════════════════════════════
// THEME
// ════════════════════════════════════════════════════════════
function applyTheme(id) {
  const t = THEMES.find(x=>x.id===id) || THEMES[0];
  const r = document.documentElement.style;
  r.setProperty('--p',  t.p);
  r.setProperty('--p2', t.p+'cc');
  r.setProperty('--s',  t.s);
  r.setProperty('--acc',t.acc);
  r.setProperty('--bg', t.bg);
}

// ════════════════════════════════════════════════════════════
// CONNECTIVITY
// ════════════════════════════════════════════════════════════
function setOnline(online) {
  isOnline = online;
  const banner = document.getElementById('offline-banner');
  const pill   = document.getElementById('sync-pill');
  if (!online) {
    banner.classList.add('show');
    if (pill) { pill.className='sync-pill sync-offline'; pill.textContent='OFFLINE'; }
  } else {
    banner.classList.remove('show');
    if (pill) { pill.className='sync-pill sync-online'; pill.textContent='EN LÍNEA'; }
    if (currentAcct) flushQueue(currentAcct);
  }
  updateBadges();
}
window.addEventListener('online',  () => setOnline(true));
window.addEventListener('offline', () => setOnline(false));

// ════════════════════════════════════════════════════════════
// GOOGLE AUTH
// ════════════════════════════════════════════════════════════
window.onGoogleLibraryLoad = function() {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback:  handleGoogleResponse,
    auto_select: false,
    use_fedcm_for_prompt: false
  });
  google.accounts.id.renderButton(
    document.getElementById('google-btn-container'),
    { theme:'outline', size:'large', width:280, text:'continue_with' }
  );
  document.getElementById('login-loading').style.display = 'none';
};

function handleGoogleResponse(response) {
  const payload = parseJwt(response.credential);
  currentUser = {
    email: payload.email,
    name:  payload.given_name || payload.name,
    photo: payload.picture,
    isAdmin: ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(payload.email.toLowerCase())
  };
  sls('user', currentUser);
  afterLogin();
}

function parseJwt(token) {
  return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
}

async function afterLogin() {
  if (isOnline) {
    try {
      const res = await fetchGet(`action=verificarAcceso&email=${encodeURIComponent(currentUser.email)}`);
      if (!res.ok || !res.permitido) { showScreen('restricted'); return; }
    } catch(e) {}
  }
  const saved = gls('config_' + currentUser.email);
  if (saved) {
    userConfig = saved;
    applyTheme(userConfig.tema || 'mayne');
    showHome();
  } else {
    obStep = 1;
    obData = {
      email:      currentUser.email,
      nombre:     currentUser.name,
      photo:      currentUser.photo,
      ingreso:    0,
      fijos:      JSON.parse(JSON.stringify(DEFAULT_FIJOS)),
      categorias: JSON.parse(JSON.stringify(DEFAULT_CATS)),
      pagos:      [...DEFAULT_PAGOS],
      tema:       'mayne'
    };
    showScreen('onboarding');
    renderOnboarding();
  }
}

async function solicitarAcceso() {
  const btn = document.getElementById('btn-solicitar');
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    const res = await postAPI({ action:'solicitarAcceso', token:TOKEN, email:currentUser.email, nombre:currentUser.name });
    if (res.ok) {
      document.getElementById('restricted-msg').textContent = '✅ Solicitud enviada. El administrador revisará tu acceso.';
      btn.style.display = 'none';
    } else {
      document.getElementById('restricted-msg').textContent = res.error || 'Error al enviar solicitud.';
      btn.disabled = false; btn.textContent = '✉️ Solicitar acceso';
    }
  } catch(e) {
    document.getElementById('restricted-msg').textContent = 'Sin conexión. Intenta de nuevo.';
    btn.disabled = false; btn.textContent = '✉️ Solicitar acceso';
  }
}

function signOut() {
  localStorage.removeItem(sk('user'));
  currentUser = null;
  if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
  showScreen('login');
}

// ════════════════════════════════════════════════════════════
// ONBOARDING
// ════════════════════════════════════════════════════════════
function renderOnboarding() {
  const container = document.getElementById('ob-container');
  const pct = (obStep / 5) * 100;
  const steps = { 1:renderOb1, 2:renderOb2, 3:renderOb3, 4:renderOb4, 5:renderOb5 };
  container.innerHTML = `
    <div class="ob-progress"><div class="ob-progress-fill" style="width:${pct}%"></div></div>
    <div class="ob-step-label">Paso ${obStep} de 5</div>
    ${obStep>1?`<button class="ob-back" onclick="obBack()">← Atrás</button>`:''}
  ` + steps[obStep]();
  container.scrollTop = 0;
}

function renderOb1() {
  return `
    <div class="ob-title">Tu perfil</div>
    <div class="avatar-upload">
      <div class="avatar-circle" onclick="document.getElementById('av-input').click()">
        ${obData.photo?`<img src="${obData.photo}" style="width:100%;height:100%;object-fit:cover">`:
        `<div class="avatar-placeholder"><span>📷</span>Tu foto</div>`}
      </div>
      <input type="file" id="av-input" accept="image/*" style="display:none" onchange="handleAvatar(this)">
      <div class="avatar-hint">Toca para subir desde galería</div>
    </div>
    <input class="ob-name-input" id="ob-name" placeholder="¿Cómo te llamas?" value="${obData.nombre||''}">
    <div class="ob-name-hint">Este nombre aparecerá en tu cuenta</div>
    <button class="ob-btn" onclick="obNext1()">Continuar →</button>`;
}

function handleAvatar(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { obData.photo=e.target.result; renderOnboarding(); };
  reader.readAsDataURL(file);
}

function obNext1() {
  const n = document.getElementById('ob-name').value.trim();
  if (!n) { showToast('Ingresa tu nombre'); return; }
  obData.nombre = n; obStep=2; renderOnboarding();
}

function renderOb2() {
  return `
    <div class="ob-title">Tu ingreso mensual</div>
    <input type="number" class="ob-income-display" id="ob-income" placeholder="$0" inputmode="decimal" value="${obData.ingreso||''}">
    <div class="ob-income-hint">¿Cuánto recibes al mes? Puedes cambiarlo después</div>
    <button class="ob-btn" onclick="obNext2()">Continuar →</button>`;
}

function obNext2() {
  const v = parseFloat(document.getElementById('ob-income').value);
  if (!v||v<=0) { showToast('Ingresa un monto válido'); return; }
  obData.ingreso=v; obStep=3; renderOnboarding();
}

function renderOb3() {
  const totalFijos = obData.fijos.reduce((s,f)=>s+(f.monto||0),0);
  const disp = obData.ingreso - totalFijos;
  return `
    <div class="ob-title">Gastos fijos</div>
    <div class="total-card">
      <div class="tc-row"><span class="tc-label">Ingreso</span><span class="tc-val">${fmxn(obData.ingreso)}</span></div>
      <div class="tc-row"><span class="tc-label">Fijos</span><span class="tc-val neg">− ${fmxn(totalFijos)}</span></div>
      <div class="tc-div"></div>
      <div class="tc-row"><span class="tc-label">Disponible variable</span><span class="tc-val ${disp>=0?'ok':'neg'}">${fmxn(disp)}</span></div>
    </div>
    <div class="chip-grid">
      ${obData.fijos.map((f,i)=>`
        <div class="chip-big active">
          <span class="ce">${f.e}</span><span class="cn">${f.l}</span><span class="ca">${fmxn(f.monto)}</span>
          <span class="chip-del" onclick="obData.fijos.splice(${i},1);renderOnboarding()">✕</span>
        </div>`).join('')}
      <div class="chip-big chip-add" onclick="openFijoModal()"><span class="ce">＋</span><span class="cn">Agregar</span></div>
    </div>
    <button class="ob-btn" onclick="obStep=4;renderOnboarding()">Continuar →</button>`;
}

function renderOb4() {
  const totalFijos = obData.fijos.reduce((s,f)=>s+(f.monto||0),0);
  const totalCats  = obData.categorias.reduce((s,c)=>s+(c.b||0),0);
  const disp = obData.ingreso - totalFijos;
  const sinAsignar = disp - totalCats;
  return `
    <div class="ob-title">Categorías de gasto</div>
    <div class="total-card">
      <div class="tc-row"><span class="tc-label">Disponible variable</span><span class="tc-val">${fmxn(disp)}</span></div>
      <div class="tc-row"><span class="tc-label">Asignado</span><span class="tc-val neg">− ${fmxn(totalCats)}</span></div>
      <div class="tc-div"></div>
      <div class="tc-row"><span class="tc-label">Sin asignar</span><span class="tc-val ${sinAsignar>=0?'ok':'neg'}">${fmxn(sinAsignar)}</span></div>
    </div>
    <div class="chip-grid">
      ${obData.categorias.map((c,i)=>`
        <div class="chip-big active">
          <span class="ce">${c.e}</span><span class="cn">${c.l}</span><span class="ca">${c.b>0?fmxn(c.b):'—'}</span>
          <span class="chip-del" onclick="obData.categorias.splice(${i},1);renderOnboarding()">✕</span>
        </div>`).join('')}
      <div class="chip-big chip-add" onclick="openCatModal()"><span class="ce">＋</span><span class="cn">Nueva</span></div>
    </div>
    <button class="ob-btn" onclick="obStep=5;renderOnboarding()">Continuar →</button>`;
}

function renderOb5() {
  const totalFijos = obData.fijos.reduce((s,f)=>s+(f.monto||0),0);
  const totalCats  = obData.categorias.reduce((s,c)=>s+(c.b||0),0);
  const sinAsignar = obData.ingreso - totalFijos - totalCats;
  return `
    <div class="ob-title">Todo listo 🐷</div>
    <div class="profile-row">
      ${obData.photo?`<img class="profile-avatar" src="${obData.photo}">`:
      `<div class="profile-avatar">${obData.nombre[0].toUpperCase()}</div>`}
      <div><div style="font-size:16px;color:var(--p)">${obData.nombre}</div>
      <div style="font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif">${obData.email}</div></div>
    </div>
    <div class="sum-section-label">Gastos fijos</div>
    <div class="sum-chips">${obData.fijos.map(f=>`
      <div class="sum-chip"><span class="sce">${f.e}</span><span class="scn">${f.l}</span><span class="sca">${fmxn(f.monto)}</span></div>`).join('')}
    </div>
    <div class="sum-section-label">Categorías</div>
    <div class="sum-chips">${obData.categorias.map(c=>`
      <div class="sum-chip"><span class="sce">${c.e}</span><span class="scn">${c.l}</span><span class="sca">${c.b>0?fmxn(c.b):'—'}</span></div>`).join('')}
    </div>
    <div class="total-card" style="margin-top:16px">
      <div class="tc-row"><span class="tc-label">Ingreso</span><span class="tc-val">${fmxn(obData.ingreso)}</span></div>
      <div class="tc-row"><span class="tc-label">Fijos</span><span class="tc-val neg">− ${fmxn(totalFijos)}</span></div>
      <div class="tc-row"><span class="tc-label">Variables</span><span class="tc-val neg">− ${fmxn(totalCats)}</span></div>
      <div class="tc-div"></div>
      <div class="tc-row"><span class="tc-label">Sin asignar</span><span class="tc-val ${sinAsignar>=0?'ok':'neg'}">${fmxn(sinAsignar)}</span></div>
    </div>
    <button class="ob-btn" onclick="finishOnboarding()">¡Empezar!</button>`;
}

function obBack() { if(obStep>1){obStep--;renderOnboarding();} }

async function finishOnboarding() {
  userConfig = {
    email:      obData.email,
    nombre:     obData.nombre,
    photo:      obData.photo,
    ingreso:    obData.ingreso,
    fijos:      obData.fijos,
    categorias: obData.categorias.map(c=>({...c,active:true})),
    pagos:      obData.pagos || [...DEFAULT_PAGOS],
    metas:      [],
    tema:       'mayne'
  };
  sls('config_' + currentUser.email, userConfig);
  applyTheme('mayne');
  if (isOnline) {
    try { await postAPI({action:'saveConfig',token:TOKEN,...userConfig,userId:currentUser.email}); } catch(e) {}
  }
  showHome();
}

// MODALES FIJO / CAT

function openFijoModal(idx) {
  editFijoIdx = idx !== undefined ? idx : null;
  const data = userConfig || obData;
  const f = idx !== undefined ? data.fijos[idx] : null;
  document.getElementById('inp-fijo-emoji').value = f?.e || '';
  document.getElementById('inp-fijo-nombre').value= f?.l || '';
  document.getElementById('inp-fijo-monto').value = f?.monto || '';
  document.getElementById('modal-fijo').classList.add('open');
}

function saveFijo() {
  const e=document.getElementById('inp-fijo-emoji').value.trim();
  const l=document.getElementById('inp-fijo-nombre').value.trim();
  const m=parseFloat(document.getElementById('inp-fijo-monto').value);
  if(!e){showToast('El emoji es obligatorio');return;}
  if(!l){showToast('Ingresa un nombre');return;}
  if(!m||m<=0){showToast('Ingresa un monto válido');return;}
  const fijo={id:l.toLowerCase().replace(/\s+/g,'_'),e,l,monto:m};
  const data=userConfig||obData;
  if(editFijoIdx!==null) data.fijos[editFijoIdx]=fijo;
  else data.fijos.push(fijo);
  if(userConfig) sls('config_'+currentUser.email,userConfig);
  document.getElementById('modal-fijo').classList.remove('open');
  if(obStep===3) renderOnboarding();
  else renderSettings();
}

function openCatModal(idx) {
  editCatIdx = idx !== undefined ? idx : null;
  const data = userConfig || obData;
  const c = idx !== undefined ? data.categorias[idx] : null;
  document.getElementById('inp-cat-emoji').value  = c?.e || '';
  document.getElementById('inp-cat-nombre').value = c?.l || '';
  document.getElementById('inp-cat-limite').value = c?.b || '';
  document.getElementById('modal-cat').classList.add('open');
}

function saveCat() {
  const e=document.getElementById('inp-cat-emoji').value.trim();
  const l=document.getElementById('inp-cat-nombre').value.trim();
  const b=parseFloat(document.getElementById('inp-cat-limite').value)||0;
  if(!e){showToast('El emoji es obligatorio');return;}
  if(!l){showToast('Ingresa un nombre');return;}
  const cat={id:l.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now(),e,l,b,active:true};
  const data=userConfig||obData;
  if(editCatIdx!==null) data.categorias[editCatIdx]={...data.categorias[editCatIdx],...cat};
  else data.categorias.push(cat);
  if(userConfig) sls('config_'+currentUser.email,userConfig);
  document.getElementById('modal-cat').classList.remove('open');
  if(obStep===4) renderOnboarding();
  else { buildCatGridModal(); renderSettings(); }
}

}

// ════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════
async function loadData() {
  document.getElementById('gastos-list').innerHTML = `<div class="loading-state"><span class="loading-spin">🐷</span>Cargando...</div>`;
  document.getElementById('cat-chips-container').innerHTML = `<div class="loading-state"><span class="loading-spin">🐷</span>Cargando...</div>`;

  if (!isOnline) {
    gastosMes = gq(currentAcct).map(g=>({...g,_pending:true}));
    budgets = {}; getCats().forEach(c=>{ budgets[c.id]=c.b||0; });
    renderAll(); return;
  }

  try {
    const mes    = getMesNombre();
    const userId = currentAcct === 'casa' ? 'casa' : currentAcct;
    const [gRes, bRes] = await Promise.all([
      fetchGet(`action=getGastos&mes=${encodeURIComponent(mes)}&userId=${userId}`),
      fetchGet(`action=getBudget&mes=${encodeURIComponent(mes)}&userId=${userId}`)
    ]);

    let gastos = gRes.ok ? gRes.gastos : [];
    // Casa: mostrar todos los gastos sin filtrar por quien

    budgets = bRes.ok ? bRes.budgets : {};
    getCats().forEach(c => { if(!budgets[c.id]) budgets[c.id] = c.b||0; });

    const pending = gq(currentAcct);
    gastosMes = [
      ...pending.map(g=>({rowIndex:null,fecha:g.fecha,categoria:g.categoria||g.category,monto:g.amount,quien:g.quien,nota:g.nota,pago:g.pago,_pending:true})),
      ...gastos
    ];
  } catch(e) {
    showToast('Error al cargar datos');
    gastosMes = [];
  }
  renderAll();
}

function switchTab(t) {
  activeTab = t;
  document.querySelectorAll('.nav-tab').forEach((el,i)=>
    el.classList.toggle('active',['inicio','gastos','resumen','metas'][i]===t));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`tab-${t}`).classList.add('active');
  renderAll();
}

function renderAll() {
  rInicio(); rGastos(); rResumen(); rMetas();
}

// ════════════════════════════════════════════════════════════
// INICIO — CHIPS
// ════════════════════════════════════════════════════════════
function rInicio() {
  const totals = {};
  gastosMes.forEach(g => { totals[g.categoria] = (totals[g.categoria]||0) + g.monto; });
  const cats = getCats();
  document.getElementById('cat-chips-container').innerHTML = `
    <div class="cat-chips-grid">
      ${cats.map(c => {
        const spent = totals[c.id] || 0;
        const lim   = budgets[c.id] || c.b || 0;
        const bal   = lim - spent;
        const pct   = lim > 0 ? Math.min((spent/lim)*100, 100) : 0;
        const fc    = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : '';
        const bc    = bal < 0 ? 'over' : bal < lim*0.2 ? 'warn' : 'ok';
        return `
          <div class="cc${pct>=100?' over':pct>=80?' warn-chip':''}" onclick="openGastoModal('${c.id}')">
            <div class="cc-top">
              <span class="cc-emoji">${c.e}</span>
              <span class="cc-balance ${bc}">${bal<0?'−'+fmxn(Math.abs(bal)):fmxn(bal)}</span>
            </div>
            <div class="cc-name">${c.l}</div>
            <div class="cc-prog"><div class="cc-prog-fill ${fc}" style="width:${pct.toFixed(1)}%"></div></div>
            <div class="cc-amounts">
              <span class="cc-spent">${fmxn(spent)}</span>
              <span>${lim>0?'/ '+fmxn(lim):'sin límite'}</span>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

// ════════════════════════════════════════════════════════════
// GASTOS
// ════════════════════════════════════════════════════════════
function rGastos() {
  const el = document.getElementById('gastos-list');
  const q  = gq(currentAcct);
  const pb = document.getElementById('pending-banner');
  if (q.length) {
    pb.classList.add('show');
    document.getElementById('pending-text').textContent = `${q.length} gasto${q.length>1?'s':''} pendiente${q.length>1?'s':''} de sincronizar`;
  } else pb.classList.remove('show');

  if (!gastosMes.length) {
    el.innerHTML=`<div class="empty-state"><div class="es-emoji">🐷</div><div class="es-text">Sin gastos este mes.<br>Toca + para registrar.</div></div>`;
    return;
  }
  const sorted = [...gastosMes].sort((a,b)=>b.fecha>a.fecha?1:-1);
  const groups = {};
  sorted.forEach(e=>{
    const d=new Date(e.fecha+'T12:00:00');
    if(!groups[e.fecha]) groups[e.fecha]={label:fday(d),items:[]};
    groups[e.fecha].items.push(e);
  });
  el.innerHTML = Object.entries(groups).sort((a,b)=>b[0]>a[0]?1:-1).map(([,g])=>`
    <div class="eg-header">${g.label}</div>
    ${g.items.map(e=>{
      const c=getCat(e.categoria);
      return `<div class="expense-item${e._pending?' pending-sync':''}">
        <div class="ei-icon">${c.e}</div>
        <div class="ei-info">
          <div class="ei-desc">${e.nota||e.categoria}</div>
          <div class="ei-meta">${c.l}${e.quien?' · '+e.quien:''}</div>
        </div>
        <div class="ei-right">
          <div class="ei-amount">${fmxn(e.monto)}</div>
          ${e.pago?`<div class="ei-pago">${e.pago}</div>`:''}
        </div>
        ${e._pending?'<div class="sync-dot"></div>':''}
      </div>`;
    }).join('')}`).join('');
}

// ════════════════════════════════════════════════════════════
// RESUMEN
// ════════════════════════════════════════════════════════════
function rResumen() {
  const fijos    = (currentAcct==='casa' ? DEFAULT_FIJOS : userConfig?.fijos || DEFAULT_FIJOS);
  const ingreso  = currentAcct==='casa' ? 44500 : (userConfig?.ingreso || 0);
  const totalFij = fijos.reduce((s,f)=>s+(f.monto||0),0);
  const totalVar = gastosMes.reduce((s,g)=>s+g.monto,0);
  const disp     = ingreso - totalFij - totalVar;

  const totals = {};
  gastosMes.forEach(g=>{ totals[g.categoria]=(totals[g.categoria]||0)+g.monto; });

  // Desglose por método de pago
  const pagoTotals = {};
  gastosMes.forEach(g=>{
    const p = g.pago || 'Sin especificar';
    pagoTotals[p] = (pagoTotals[p]||0) + g.monto;
  });

  const cats = getCats();
  const maxAmt = Math.max(...cats.map(c=>totals[c.id]||0), 1);

  document.getElementById('resumen-content').innerHTML = `
    <div class="res-balance">
      <div class="rb"><div class="rb-label">Ingreso</div><div class="rb-val">${fmxn(ingreso)}</div></div>
      <div class="rb"><div class="rb-label">Variable</div><div class="rb-val warn">${fmxn(totalVar)}</div></div>
      <div class="rb"><div class="rb-label">Disponible</div><div class="rb-val ${disp>=0?'green':'warn'}">${fmxn(Math.abs(disp))}</div></div>
    </div>

    <div class="res-section">Por categoría</div>
    ${cats.map(c=>{
      const spent=totals[c.id]||0;
      const lim=budgets[c.id]||c.b||0;
      const pct=lim>0?Math.min((spent/lim)*100,100):Math.min((spent/maxAmt)*100,100);
      const fc=lim>0&&spent>lim?'over':lim>0&&spent>lim*0.8?'warn':'';
      return `<div class="res-cat-row">
        <span class="res-cat-emoji">${c.e}</span>
        <span class="res-cat-name">${c.l}</span>
        <div class="res-cat-bar"><div class="res-cat-fill ${fc}" style="width:${pct.toFixed(1)}%"></div></div>
        <span class="res-cat-amt">${fmxn(spent)}</span>
      </div>`;
    }).join('')}

    <div class="res-section">Método de pago</div>
    <div class="pago-card">
      ${Object.entries(pagoTotals).length
        ? Object.entries(pagoTotals).sort((a,b)=>b[1]-a[1]).map(([p,amt])=>`
          <div class="pago-row"><span class="pago-label">${p}</span><span class="pago-val">${fmxn(amt)}</span></div>`).join('')
        : `<div style="text-align:center;padding:12px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;font-size:13px">Sin datos de pago aún</div>`}
    </div>`;
}

function selCat(el) {

function openGastoModal(catId) {
  preselCat = catId;
  document.getElementById('modal-gasto').classList.add('open');
  document.getElementById('modal-gasto-title').textContent = 'Nuevo gasto';
  ['inp-amount','inp-desc','inp-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('inp-fecha').value = today();
  document.querySelectorAll('.cat-chip-m').forEach(c=>c.classList.remove('selected'));
  document.querySelectorAll('.pago-chip').forEach(c=>c.classList.remove('selected'));
  if (catId) {
    const chip = document.querySelector(`.cat-chip-m[data-cat="${catId}"]`);
    if (chip) chip.classList.add('selected');
  }
  const btn = document.getElementById('btn-submit-gasto');
  btn.disabled=false; btn.textContent='Registrar gasto';
  setTimeout(()=>document.getElementById('inp-amount').focus(),300);
}

document.getElementById('modal-gasto').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('modal-cat').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('modal-fijo').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

async function submitGasto() {
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const desc   = document.getElementById('inp-desc').value.trim();
  const note   = document.getElementById('inp-note').value.trim();
  const fecha  = document.getElementById('inp-fecha').value;
  const catEl  = document.querySelector('.cat-chip-m.selected');
  const pagoEl = document.querySelector('.pago-chip.selected');

  if (!amount||amount<=0) { showToast('Ingresa un monto válido'); return; }
  if (!desc)  { showToast('Agrega una descripción'); return; }
  if (!catEl) { showToast('Selecciona una categoría'); return; }
  if (!fecha) { showToast('Selecciona una fecha'); return; }

  const isCasa = currentAcct === 'casa';
  const quien  = isCasa
    ? 'Casa'
    : (userConfig?.nombre || currentUser?.name || 'Usuario');

  const pago = pagoEl?.dataset.pago || '';

  const gasto = {
    localId:  uid(),
    account:  currentAcct,
    amount,
    categoria: catEl.dataset.cat,
    fecha,
    quien,
    nota: desc + (note?' · '+note:''),
    pago,
    userId: isCasa ? 'casa' : currentAcct
  };

  const btn = document.getElementById('btn-submit-gasto');
  btn.disabled=true; btn.textContent='Guardando...';

  if (!isOnline) {
    const q=gq(currentAcct); q.push(gasto); sq(currentAcct,q);
    showToast('Guardado offline 🟡');
    document.getElementById('modal-gasto').classList.remove('open');
    updateBadges();
    gastosMes.unshift({rowIndex:null,fecha,categoria:gasto.categoria,monto:amount,quien,nota:gasto.nota,pago,_pending:true});
    renderAll();
  } else {
    try {
      const res = await postAPI({
        action:'registrarGasto', token:TOKEN,
        fecha, categoria:gasto.categoria, monto:amount,
        quien, nota:gasto.nota, pago, userId:gasto.userId
      });
      if (res.ok) {
        showToast('Gasto registrado ✓');
        document.getElementById('modal-gasto').classList.remove('open');
        await loadData();
      } else {
        const q=gq(currentAcct); q.push(gasto); sq(currentAcct,q);
        showToast('Error — guardado offline 🟡');
        document.getElementById('modal-gasto').classList.remove('open');
        updateBadges();
      }
    } catch(e) {
      const q=gq(currentAcct); q.push(gasto); sq(currentAcct,q);
      showToast('Sin conexión — guardado offline 🟡');
      document.getElementById('modal-gasto').classList.remove('open');
      updateBadges();
    }
  }
  playSuccess();
}

// ════════════════════════════════════════════════════════════
// FLUSH QUEUE
// ════════════════════════════════════════════════════════════
async function flushQueue(acct) {
  const q = gq(acct);
  if (!q.length||!isOnline) return;
  try {
    const gastos = q.map(g=>({
      fecha:g.fecha, categoria:g.categoria||g.category, monto:g.amount,
      quien:g.quien, nota:g.nota, pago:g.pago||'', userId:g.userId||acct,
      localId:g.localId||uid()
    }));
    const res = await postAPI({action:'registrarBatch',token:TOKEN,gastos});
    if (res.ok) {
      sq(acct,[]);
      showToast(`${q.length} gasto${q.length>1?'s':''} sincronizado${q.length>1?'s':''} ✓`);
      updateBadges();
      if (currentAcct===acct) await loadData();
    }
  } catch(e) {}
}

      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Gastos fijos</div>

        ${(cfg.fijos||[]).map((f,i)=>`
          <div class="chip-big active" onclick="openFijoModal(${i})">
            <span class="ce">${f.e}</span><span class="cn">${f.l}</span><span class="ca">${fmxn(f.monto)}</span>
          </div>`).join('')}
        <div class="chip-big chip-add" onclick="openFijoModal()"><span class="ce">＋</span><span class="cn">Agregar</span></div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-title">Categorías</div>
      <div class="chip-grid">
        ${(cfg.categorias||[]).map((c,i)=>`
          <div class="chip-big${c.active!==false?' active':''}" onclick="toggleCat(${i})">
            <span class="ce">${c.e}</span><span class="cn">${c.l}</span><span class="ca">${c.b>0?fmxn(c.b):'—'}</span>
          </div>`).join('')}
        <div class="chip-big chip-add" onclick="openCatModal()"><span class="ce">＋</span><span class="cn">Nueva</span></div>
      </div>
    </div>

    <div class="settings-section">
      <button onclick="signOut()" style="background:none;border:none;color:var(--danger);font-size:14px;font-family:'Helvetica Neue',sans-serif;cursor:pointer;padding:4px 0">
        Cerrar sesión
      </button>
    </div>`:``}`;
}

function selTheme(id) {
  applyTheme(id);
  if (userConfig) { userConfig.tema=id; sls('config_'+currentUser.email,userConfig); }
  renderSettings();
  if (isOnline&&userConfig) postAPI({action:'saveConfig',token:TOKEN,...userConfig,userId:currentUser.email}).catch(()=>{});
}

function toggleCat(i) {
  if (!userConfig) return;
  const cat = userConfig.categorias[i];
  const hasGastos = gastosMes.some(g=>g.categoria===cat.id);
  if (hasGastos&&cat.active!==false) { showToast('No puedes desactivar una categoría con gastos este mes'); return; }
  cat.active = !cat.active;
  sls('config_'+currentUser.email,userConfig);
  renderSettings(); buildCatGridModal();
}

function addPago() {
  const nombre = prompt('Nombre del banco o método:');
  if (!nombre||!nombre.trim()) return;
  if (!userConfig.pagos) userConfig.pagos = [...DEFAULT_PAGOS];
  userConfig.pagos.push(nombre.trim());
  sls('config_'+currentUser.email,userConfig);
  buildPagoGrid(); renderSettings();
}

function removePago(i) {
  userConfig.pagos.splice(i,1);
  sls('config_'+currentUser.email,userConfig);
  buildPagoGrid(); renderSettings();
}

// AUDIO
// ════════════════════════════════════════════════════════════
let _ac;
const getAC=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;};
function playTone(n,v,t){try{const ctx=getAC();let tm=ctx.currentTime;n.forEach(([f,d])=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t||'square';o.frequency.value=f;g.gain.setValueAtTime(v,tm);g.gain.exponentialRampToValueAtTime(0.001,tm+d);o.start(tm);o.stop(tm+d);tm+=d*0.85;});}catch(e){}}
function playSuccess(){playTone([[523,.08],[659,.08],[784,.08],[1047,.15]],.3,'square');}
