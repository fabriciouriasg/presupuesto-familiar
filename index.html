<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PiggyBank">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PiggyBank</title>
<style>
:root{
  --p:#542916;--p2:#7a3d22;--s:#b79858;--acc:#a13a1e;
  --bleu:#88b8ce;--bg:#fefaf0;--card:#ffffff;
  --text:#2c1a0e;--muted:#7a5c3e;--border:rgba(84,41,22,0.15);
  --success:#2d7a4f;--danger:#a13a1e;--miel:#f1c166;
  --surface:#fff8f0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.sans{font-family:'Helvetica Neue',sans-serif}
#offline-banner{position:fixed;top:0;left:0;right:0;background:var(--danger);color:#fff;text-align:center;font-size:12px;padding:6px 12px;z-index:9999;display:none;font-family:'Helvetica Neue',sans-serif}
#offline-banner.show{display:block}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ── LOGIN ── */
#screen-login{background:linear-gradient(160deg,var(--p) 0%,var(--p2) 50%,var(--acc) 100%);align-items:center;justify-content:center}
.login-inner{display:flex;flex-direction:column;align-items:center;gap:32px;padding:40px 24px;width:100%;max-width:320px;position:relative;z-index:1}
.login-pig{display:flex;flex-direction:column;align-items:center;gap:12px}
.login-title{font-size:38px;color:var(--bg);letter-spacing:2px}
.login-sub{font-size:11px;color:rgba(254,250,240,0.55);letter-spacing:3px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif}
.google-btn{display:flex;align-items:center;gap:12px;background:var(--bg);border:none;border-radius:14px;padding:16px 24px;cursor:pointer;width:100%;font-size:15px;font-family:'Helvetica Neue',sans-serif;color:var(--text);font-weight:600;transition:transform 0.15s}
.google-btn:active{transform:scale(0.97)}
.google-icon{width:22px;height:22px}

/* ── ONBOARDING ── */
#screen-onboarding{background:var(--surface);overflow-y:auto}
.ob-container{padding:20px 20px 48px;max-width:420px;margin:0 auto}
.ob-progress{height:3px;background:var(--border);border-radius:2px;margin-bottom:24px;overflow:hidden}
.ob-progress-fill{height:100%;border-radius:2px;background:var(--p);transition:width 0.4s ease}
.ob-step-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin-bottom:8px}
.ob-title{font-size:24px;color:var(--p);margin-bottom:20px}
.avatar-upload{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:24px}
.avatar-circle{width:88px;height:88px;border-radius:50%;border:2.5px dashed var(--s);background:rgba(183,152,88,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.avatar-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--s);font-size:11px;font-family:'Helvetica Neue',sans-serif}
.avatar-placeholder span{font-size:24px}
.avatar-hint{font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif}
.ob-name-input{border:none;border-bottom:2.5px solid var(--s);background:transparent;font-size:26px;font-family:'Georgia',serif;color:var(--text);width:100%;padding:6px 0;outline:none;text-align:center;margin-bottom:4px}
.ob-name-input::placeholder{color:var(--border)}
.ob-name-hint{text-align:center;font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;margin-bottom:24px}
.ob-income-display{font-size:36px;font-family:'Georgia',serif;color:var(--text);border-bottom:2.5px solid var(--s);text-align:center;width:100%;padding:8px 0;outline:none;margin-bottom:6px;background:transparent;border-top:none;border-left:none;border-right:none}
.ob-income-hint{text-align:center;font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;margin-bottom:24px}
.total-card{background:rgba(183,152,88,0.1);border:1px solid rgba(183,152,88,0.3);border-radius:12px;padding:12px 16px;margin-bottom:16px}
.tc-row{display:flex;justify-content:space-between;font-size:12px;font-family:'Helvetica Neue',sans-serif;padding:3px 0}
.tc-label{color:var(--muted)}
.tc-val{font-weight:700;color:var(--text)}
.tc-val.ok{color:var(--success)}
.tc-val.neg{color:var(--danger)}
.tc-div{height:1px;background:var(--border);margin:6px 0}
.chip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.chip-big{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 4px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);font-size:11px;font-family:'Helvetica Neue',sans-serif;color:var(--muted);cursor:pointer;position:relative;transition:all 0.15s;min-height:80px}
.chip-big .ce{font-size:22px}
.chip-big .cn{font-size:11px;text-align:center;line-height:1.3}
.chip-big .ca{font-size:10px;font-weight:700;color:var(--s)}
.chip-big.active{border-color:var(--s);background:rgba(183,152,88,0.1);color:var(--p)}
.chip-big.active .ca{color:var(--p)}
.chip-big .chip-del{position:absolute;top:4px;right:6px;font-size:11px;color:var(--muted);padding:2px}
.chip-add{border-style:dashed;color:var(--s)}
.chip-add .ce{color:var(--s)}
.ob-btn{width:100%;background:var(--p);color:var(--bg);border:none;border-radius:12px;padding:15px;font-size:15px;font-family:'Georgia',serif;cursor:pointer;transition:background 0.2s,transform 0.15s;margin-top:8px}
.ob-btn:active{background:var(--acc);transform:scale(0.98)}
.ob-back{background:none;border:none;color:var(--muted);font-size:13px;font-family:'Helvetica Neue',sans-serif;cursor:pointer;margin-bottom:16px;padding:0}
.sum-section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin:14px 0 8px}
.sum-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.sum-chip{display:inline-flex;flex-direction:column;align-items:center;gap:2px;background:rgba(183,152,88,0.08);border:1px solid rgba(183,152,88,0.2);border-radius:10px;padding:7px 10px;font-family:'Helvetica Neue',sans-serif}
.sum-chip .sce{font-size:16px}
.sum-chip .scn{font-size:10px;color:var(--muted)}
.sum-chip .sca{font-size:10px;font-weight:700;color:var(--s)}
.profile-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.profile-avatar{width:56px;height:56px;border-radius:50%;border:2px solid var(--s);object-fit:cover;background:rgba(183,152,88,0.12);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}

/* ── HOME ── */
#screen-home{background:linear-gradient(160deg,var(--p) 0%,var(--p2) 50%,var(--acc) 100%);align-items:center;justify-content:center;position:relative;overflow:hidden}
#screen-home::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.04)}
#screen-home::after{content:'';position:absolute;bottom:-80px;left:-40px;width:280px;height:280px;border-radius:50%;background:rgba(183,152,88,0.08)}
.home-inner{display:flex;flex-direction:column;align-items:center;gap:40px;padding:40px 24px;width:100%;position:relative;z-index:1}
.home-logo{display:flex;flex-direction:column;align-items:center;gap:12px}
.home-title{font-size:36px;color:var(--bg);letter-spacing:2px}
.home-sub{font-size:11px;color:rgba(254,250,240,0.5);letter-spacing:3px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif}
.home-accounts{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px}
.account-btn{border:none;border-radius:16px;padding:18px 20px;cursor:pointer;text-align:left;transition:transform 0.15s;position:relative;overflow:hidden;width:100%;display:flex;align-items:center;gap:14px}
.account-btn:active{transform:scale(0.97)}
.account-btn.casa{background:var(--bg)}
.account-btn.personal{background:var(--bleu)}
.acc-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.acc-avatar.casa-av{background:rgba(84,41,22,0.1)}
.acc-avatar.personal-av{background:rgba(255,255,255,0.3)}
.acc-info{flex:1}
.acc-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;opacity:0.55;margin-bottom:2px}
.account-btn.casa .acc-label{color:var(--muted)}
.account-btn.personal .acc-label{color:#1a3f52}
.acc-name{font-size:20px}
.account-btn.casa .acc-name{color:var(--p)}
.account-btn.personal .acc-name{color:#1a3f52}
.acc-sub{font-size:11px;font-family:'Helvetica Neue',sans-serif;opacity:0.6;margin-top:2px}
.account-btn.casa .acc-sub{color:var(--muted)}
.account-btn.personal .acc-sub{color:#2a5a72}
.acc-arrow{font-size:20px;opacity:0.25;flex-shrink:0}
.account-btn.casa .acc-arrow{color:var(--p)}
.account-btn.personal .acc-arrow{color:#1a3f52}
.pending-badge{position:absolute;top:12px;right:40px;background:var(--miel);color:#3a1a0d;font-size:10px;font-family:'Helvetica Neue',sans-serif;font-weight:700;padding:2px 7px;border-radius:20px;display:none}
.pending-badge.show{display:block}

/* ── APP ── */
#screen-app{background:var(--surface)}
.app-header{background:var(--p);padding:16px 20px 20px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back-btn{background:rgba(255,255,255,0.12);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--bg);font-size:22px;flex-shrink:0}
.back-btn:active{background:rgba(255,255,255,0.22)}
.header-av{width:32px;height:32px;border-radius:50%;object-fit:cover;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(255,255,255,0.15);flex-shrink:0}
.header-info{flex:1}
.header-name{font-size:17px;color:var(--bg)}
.header-month{font-size:11px;color:rgba(254,250,240,0.5);font-family:'Helvetica Neue',sans-serif;letter-spacing:1px}
.sync-pill{border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;font-family:'Helvetica Neue',sans-serif;flex-shrink:0;border:none;cursor:default;letter-spacing:0.5px}
.sync-online{background:rgba(77,220,138,0.2);color:#4ddc8a;border:1px solid rgba(77,220,138,0.3)}
.sync-offline{background:rgba(241,193,102,0.2);color:var(--miel);border:1px solid rgba(241,193,102,0.4);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.summary-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(--p)}
.sc{background:rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px}
.sc-label{font-size:9px;color:rgba(254,250,240,0.5);letter-spacing:1.5px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;margin-bottom:3px}
.sc-value{font-size:17px;color:var(--bg)}
.sc-value.green{color:#7ff0b0}
.sc-value.warn{color:var(--miel)}
.nav-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border)}
.nav-tab{flex:1;padding:11px 6px;border:none;background:none;cursor:pointer;font-size:11px;font-family:'Helvetica Neue',sans-serif;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:0.3px}
.nav-tab.active{color:var(--p);border-bottom-color:var(--s);font-weight:700}
.tab-panel{display:none;padding:16px;padding-bottom:88px}
.tab-panel.active{display:block}
.fab{position:fixed;bottom:28px;right:24px;width:58px;height:58px;border-radius:50%;background:var(--p);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;font-size:28px;color:var(--bg);box-shadow:0 4px 20px rgba(84,41,22,0.4);transition:transform 0.2s}
.fab:active{transform:scale(0.9);background:var(--acc)}
.settings-btn{position:fixed;bottom:96px;right:28px;width:44px;height:44px;border-radius:50%;background:rgba(84,41,22,0.08);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;font-size:18px;color:var(--muted);transition:background 0.2s}
.settings-btn:active{background:rgba(84,41,22,0.15)}

/* ── GASTO ITEMS ── */
.pending-banner{background:rgba(241,193,102,0.12);border:1px solid rgba(241,193,102,0.35);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:none;align-items:center;gap:8px;font-size:12px;font-family:'Helvetica Neue',sans-serif;color:var(--p)}
.pending-banner.show{display:flex}
.expense-group{margin-bottom:18px}
.eg-header{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin-bottom:8px;padding-left:2px}
.expense-item{background:var(--card);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-bottom:7px;border:1px solid var(--border);position:relative}
.expense-item.pending-sync{border-left:3px solid var(--miel)}
.ei-icon{width:40px;height:40px;border-radius:11px;background:rgba(183,152,88,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ei-info{flex:1;min-width:0}
.ei-desc{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ei-meta{font-size:11px;color:var(--muted);font-family:'Helvetica Neue',sans-serif}
.ei-amount{font-size:15px;color:var(--acc);flex-shrink:0;font-family:'Helvetica Neue',sans-serif;font-weight:600}
.sync-dot{position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--miel)}

/* ── CATEGORÍAS ── */
.cp-item{margin-bottom:14px}
.cp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:13px;font-family:'Helvetica Neue',sans-serif}
.pb-track{height:6px;background:rgba(84,41,22,0.08);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;background:var(--s);transition:width 0.5s}
.pb-fill.warn{background:var(--miel)}
.pb-fill.over{background:var(--danger)}

/* ── MODALES ── */
.modal-overlay{position:fixed;inset:0;background:rgba(20,8,2,0.6);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:24px 20px 48px;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 20px}
.modal-title{font-size:20px;color:var(--p);margin-bottom:20px}
.form-group{margin-bottom:15px}
.form-label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'Helvetica Neue',sans-serif;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:16px;font-family:'Georgia',serif;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--s)}
.amount-input{font-size:28px;text-align:center}
.cat-grid-modal{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-chip-m{border:1.5px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;font-size:11px;font-family:'Helvetica Neue',sans-serif;color:var(--muted);background:var(--bg);transition:all 0.15s;line-height:1.4}
.cat-chip-m .ce{font-size:20px;display:block;margin-bottom:3px}
.cat-chip-m.selected{border-color:var(--s);background:rgba(183,152,88,0.1);color:var(--p)}
.btn-submit{width:100%;background:var(--p);color:var(--bg);border:none;border-radius:12px;padding:15px;font-size:15px;font-family:'Georgia',serif;cursor:pointer;margin-top:8px;transition:background 0.2s,transform 0.15s}
.btn-submit:active{background:var(--acc);transform:scale(0.98)}
.btn-submit:disabled{background:#aaa;cursor:not-allowed}

/* ── SETTINGS ── */
#screen-settings{background:var(--surface)}
.settings-header{background:var(--p);padding:16px 20px 20px}
.settings-section{padding:16px 20px}
.settings-title{font-size:14px;font-weight:700;color:var(--p);font-family:'Helvetica Neue',sans-serif;letter-spacing:0.5px;margin-bottom:12px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-family:'Helvetica Neue',sans-serif;font-size:14px;cursor:pointer}
.settings-row:last-child{border-bottom:none}
.theme-grid-s{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.theme-card-s{border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s}
.theme-card-s.sel{border-color:var(--p)}
.tc-swatches-s{display:flex;height:28px}
.tc-swatch-s{flex:1}
.tc-body-s{padding:6px 8px;background:var(--card)}
.tc-name-s{font-size:11px;font-weight:600;color:var(--text);font-family:'Helvetica Neue',sans-serif}

/* ── MISC ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.es-emoji{font-size:40px;margin-bottom:12px}
.es-text{font-size:14px;font-family:'Helvetica Neue',sans-serif;line-height:1.6}
.loading-state{text-align:center;padding:40px 24px;color:var(--muted);font-family:'Helvetica Neue',sans-serif;font-size:14px}
.loading-spin{font-size:28px;display:block;margin-bottom:12px;animation:spin 1.2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e0c04;color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-family:'Helvetica Neue',sans-serif;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;max-width:88vw;text-align:center;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.divider{height:1px;background:var(--border);margin:4px 0}
</style>
</head>
<body>
<div id="offline-banner">⚡ Sin conexión — guardando localmente</div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-inner">
    <div class="login-pig">
      <svg width="80" height="80" viewBox="0 0 88 88" fill="none">
        <ellipse cx="40" cy="52" rx="26" ry="22" stroke="#fefaf0" stroke-width="2.8" fill="none"/>
        <circle cx="62" cy="32" r="13" stroke="#fefaf0" stroke-width="2.6" fill="none"/>
        <text x="62" y="37" text-anchor="middle" font-size="14" fill="#fefaf0" font-family="Georgia,serif">$</text>
        <path d="M49 40 Q55 36 62 39" stroke="#fefaf0" stroke-width="2" stroke-linecap="round" fill="none"/>
        <ellipse cx="36" cy="49" rx="5" ry="4" stroke="#fefaf0" stroke-width="1.8" fill="none"/>
        <ellipse cx="48" cy="49" rx="5" ry="4" stroke="#fefaf0" stroke-width="1.8" fill="none"/>
        <circle cx="52" cy="57" r="1.5" fill="#fefaf0"/>
        <path d="M44 62 Q40 66 36 62" stroke="#fefaf0" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M22 62 Q18 72 16 76" stroke="#fefaf0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M30 68 Q26 76 24 80" stroke="#fefaf0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M56 68 Q60 76 62 80" stroke="#fefaf0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M64 62 Q68 72 70 76" stroke="#fefaf0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
      <div class="login-title">PiggyBank</div>
      <div class="login-sub">Control de gastos</div>
    </div>
    <button class="google-btn" onclick="signInWithGoogle()">

<script>
// ============================================================

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoBfebGTYiGMjniSz8h7wfxVCrzdSnNA_bVEiMyIAL8FW74rVkOYsraV_Xl4-Yxil_/exec';

const THEMES = [
  {id:'mayne',    name:'Mayne',          swatches:['#542916','#b79858','#a13a1e','#88b8ce','#fefaf0'], p:'#542916',s:'#b79858',acc:'#a13a1e',bg:'#fefaf0'},
  {id:'sage',     name:'Sage & Sand',    swatches:['#4a7c6f','#6aab99','#e8b86d','#f5efe6','#d4614a'], p:'#4a7c6f',s:'#6aab99',acc:'#e8b86d',bg:'#f5efe6'},

  {id:'lavender', name:'Lavender & Mint',swatches:['#7c6faa','#a89fd4','#5dbea3','#f4f0fb','#e06b8b'], p:'#7c6faa',s:'#a89fd4',acc:'#5dbea3',bg:'#f4f0fb'},

  {id:'ocean',    name:'Deep Ocean',     swatches:['#0a4f6e','#1a8fa8','#40c8d4','#e8f7fa','#e05c3a'], p:'#0a4f6e',s:'#1a8fa8',acc:'#40c8d4',bg:'#e8f7fa'},
  {id:'clearsky', name:'Clear Sky',      swatches:['#5b9bd5','#90c4f0','#ffd166','#f0f8ff','#ff6b6b'], p:'#5b9bd5',s:'#90c4f0',acc:'#ffd166',bg:'#f0f8ff'},
  {id:'codec',    name:'Codec',          swatches:['#0a0f0a','#1a2e1a','#4aff91','#0d1a0d','#ff3a3a'], p:'#0d1a0d',s:'#1a2e1a',acc:'#4aff91',bg:'#0a0f0a'}
];

// ============================================================

// ============================================================
let currentUser  = null;  // { email, name, photo, isAdmin }
let currentAcct  = null;  // 'casa' | userId
let userConfig   = null;  // config del usuario actual
let gastosMes    = [];
let budgets      = {};
let isOnline     = navigator.onLine;
let activeTab    = 'gastos';
let obStep       = 1;
let obData       = {};    // datos acumulados del onboarding
let editingFijoIdx = null;
let editingCatIdx  = null;

const sk  = (k) => `pb_${k}`;
const gls = (k) => { try { return JSON.parse(localStorage.getItem(sk(k))); } catch { return null; }};
const sls = (k,v) => localStorage.setItem(sk(k), JSON.stringify(v));
const gq  = (acct) => { try { return JSON.parse(localStorage.getItem(`pb_q_${acct}`) || '[]'); } catch { return []; }};
const sq  = (acct,d) => localStorage.setItem(`pb_q_${acct}`, JSON.stringify(d));
const uid = () => `exp_${Date.now().toString(36)}_${Math.random().toString(36).substr(2,6)}`;
const fmxn = n => '$' + Math.round(n).toLocaleString('es-MX');
const fday  = d => `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()].substr(0,3)}`;
const fmonth= d => `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
const today = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const getMesNombre = () => MONTHS[new Date().getMonth()] + ' ' + new Date().getFullYear();

// ============================================================
// THEME
// ============================================================
function applyTheme(themeId) {
  const t = THEMES.find(x => x.id === themeId) || THEMES[0];
  const r = document.documentElement.style;
  r.setProperty('--p',   t.p);
  r.setProperty('--p2',  t.p + 'cc');
  r.setProperty('--s',   t.s);
  r.setProperty('--acc', t.acc);
  r.setProperty('--bg',  t.bg);
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content', t.p);
}

// ============================================================
// CONNECTIVITY
// ============================================================
function setOnline(online) {
  isOnline = online;
  const banner = document.getElementById('offline-banner');
  const pill   = document.getElementById('sync-pill');
  if (!online) {
    banner.classList.add('show');
    if (pill) { pill.className='sync-pill sync-offline'; pill.textContent='OFFLINE'; }
  } else {
    banner.classList.remove('show');
    if (pill) { pill.className='sync-pill sync-online'; pill.textContent='EN LÍNEA'; }
    if (currentAcct) flushQueue(currentAcct);
  }
  updateBadges();
}
window.addEventListener('online',  () => setOnline(true));
window.addEventListener('offline', () => setOnline(false));

// ============================================================
// GOOGLE OAUTH
// ============================================================
function signInWithGoogle() {
  // Usar Google Identity Services
  if (typeof google === 'undefined') {
    showToast('Cargando Google Sign-In...');
    return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleResponse,
    auto_select: false
  });
  google.accounts.id.prompt();
}

function handleGoogleResponse(response) {
  const payload = parseJwt(response.credential);
  currentUser = {
    email: payload.email,
    name:  payload.given_name || payload.name,
    photo: payload.picture,
    isAdmin: ADMIN_EMAILS.includes(payload.email.toLowerCase())
  };
  sls('user', currentUser);
  afterLogin();
}

function parseJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(atob(base64));
}

async function afterLogin() {
  // Verificar acceso
  if (isOnline) {
    try {
      const res = await fetchGet(`action=verificarAcceso&email=${encodeURIComponent(currentUser.email)}`);
      if (!res.ok || !res.permitido) {
        showScreen('restricted');
        return;
      }
    } catch(e) {
      // Si no hay conexión, continuar con sesión guardada
    }
  }

  const saved = gls('config_' + currentUser.email);
  if (saved) {
    userConfig = saved;
    applyTheme(userConfig.tema || 'mayne');
    showHome();
  } else {
    obStep = 1;
    obData = {
      email:      currentUser.email,
      nombre:     currentUser.name,
      photo:      currentUser.photo,
      ingreso:    0,
      fijos:      JSON.parse(JSON.stringify(DEFAULT_FIJOS)),
      categorias: JSON.parse(JSON.stringify(DEFAULT_CATS)),
      tema:       'mayne'
    };
    showScreen('onboarding');
    renderOnboarding();
  }
}

async function solicitarAcceso() {
  const btn = document.getElementById('btn-solicitar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  try {
    const res = await postAPI({
      action:  'solicitarAcceso',
      token:   TOKEN,
      email:   currentUser.email,
      nombre:  currentUser.name
    });
    if (res.ok) {
      document.getElementById('restricted-msg').textContent = '✅ Solicitud enviada. El administrador revisará tu acceso pronto.';
      btn.style.display = 'none';
    } else {
      document.getElementById('restricted-msg').textContent = res.error || 'Error al enviar solicitud.';
      btn.disabled = false;
      btn.textContent = '✉️ Solicitar acceso';
    }
  } catch(e) {
    document.getElementById('restricted-msg').textContent = 'Sin conexión. Intenta de nuevo.';
    btn.disabled = false;
    btn.textContent = '✉️ Solicitar acceso';
  }
}

function signOut() {
  localStorage.removeItem(sk('user'));
  currentUser = null;
  if (typeof google !== 'undefined') {
    google.accounts.id.disableAutoSelect();
  }
  showScreen('login');
}

// ============================================================
// ONBOARDING
// ============================================================
function renderOnboarding() {
  const container = document.getElementById('ob-container');
  const pct = (obStep / 5) * 100;

  const steps = {
    1: renderObStep1,
    2: renderObStep2,
    3: renderObStep3,
    4: renderObStep4,
    5: renderObStep5
  };

  container.innerHTML = `
    <div class="ob-progress"><div class="ob-progress-fill" style="width:${pct}%"></div></div>
    <div class="ob-step-label">Paso ${obStep} de 5</div>
    ${obStep > 1 ? `<button class="ob-back" onclick="obBack()">← Atrás</button>` : ''}
  ` + (steps[obStep] ? steps[obStep]() : '');
  container.scrollTop = 0;
}

function renderObStep1() {
  return `
    <div class="ob-title">Tu perfil</div>
    <div class="avatar-upload">
      <div class="avatar-circle" onclick="document.getElementById('avatar-input').click()">
        ${obData.photo
          ? `<img src="${obData.photo}" id="avatar-preview">`
          : `<div class="avatar-placeholder"><span>📷</span>Tu foto</div>`}
      </div>
      <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="handleAvatarChange(this)">
      <div class="avatar-hint">Toca para subir desde galería</div>
    </div>
    <input class="ob-name-input" id="ob-name" placeholder="¿Cómo te llamas?" value="${obData.nombre || ''}">
    <div class="ob-name-hint">Este nombre aparecerá en tu cuenta</div>
    <button class="ob-btn" onclick="obNext1()">Continuar →</button>
  `;
}

function handleAvatarChange(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    obData.photo = e.target.result;
    const circle = document.querySelector('.avatar-circle');
    circle.innerHTML = `<img src="${obData.photo}" id="avatar-preview">`;
  };
  reader.readAsDataURL(file);
}

function obNext1() {
  const nombre = document.getElementById('ob-name').value.trim();
  if (!nombre) { showToast('Ingresa tu nombre'); return; }
  obData.nombre = nombre;
  obStep = 2; renderOnboarding();
}

function renderObStep2() {
  return `
    <div class="ob-title">Tu ingreso mensual</div>
    <input type="number" class="ob-income-display" id="ob-income"
      placeholder="$0" inputmode="decimal" value="${obData.ingreso || ''}">
    <div class="ob-income-hint">¿Cuánto recibes al mes? Puedes cambiarlo después</div>
    <button class="ob-btn" onclick="obNext2()">Continuar →</button>
  `;
}

function obNext2() {
  const v = parseFloat(document.getElementById('ob-income').value);
  if (!v || v <= 0) { showToast('Ingresa un monto válido'); return; }
  obData.ingreso = v;
  obStep = 3; renderOnboarding();
}

function renderObStep3() {
  const totalFijos = obData.fijos.reduce((s,f) => s + (f.monto||0), 0);
  const disp = obData.ingreso - totalFijos;
  return `
    <div class="ob-title">Gastos fijos</div>
    <div class="total-card">
      <div class="tc-row"><span class="tc-label">Ingreso</span><span class="tc-val">${fmxn(obData.ingreso)}</span></div>
      <div class="tc-row"><span class="tc-label">Fijos comprometidos</span><span class="tc-val neg">− ${fmxn(totalFijos)}</span></div>
      <div class="tc-div"></div>
      <div class="tc-row"><span class="tc-label">Disponible para variables</span><span class="tc-val ${disp>=0?'ok':'neg'}">${fmxn(disp)}</span></div>
    </div>
    <div class="chip-grid">
      ${obData.fijos.map((f,i) => `
        <div class="chip-big active">
          <span class="ce">${f.e}</span>
          <span class="cn">${f.l}</span>
          <span class="ca">${fmxn(f.monto)}</span>

function openFijoModal(idx) {
  editingFijoIdx = idx !== undefined ? idx : null;
  const fijo = idx !== undefined ? (userConfig||obData).fijos[idx] : null;
  document.getElementById('inp-fijo-emoji').value = fijo ? fijo.e : '';
  document.getElementById('inp-fijo-nombre').value = fijo ? fijo.l : '';
  document.getElementById('inp-fijo-monto').value = fijo ? fijo.monto : '';
  document.getElementById('modal-fijo').classList.add('open');
}

function saveFijo() {
  const e = document.getElementById('inp-fijo-emoji').value.trim();
  const l = document.getElementById('inp-fijo-nombre').value.trim();
  const m = parseFloat(document.getElementById('inp-fijo-monto').value);
  if (!e) { showToast('El emoji es obligatorio'); return; }
  if (!l) { showToast('Ingresa un nombre'); return; }
  if (!m || m <= 0) { showToast('Ingresa un monto válido'); return; }
  const fijo = { id: l.toLowerCase().replace(/\s+/g,'_'), e, l, monto: m };
  const data = userConfig || obData;
  if (editingFijoIdx !== null) data.fijos[editingFijoIdx] = fijo;
  else data.fijos.push(fijo);
  document.getElementById('modal-fijo').classList.remove('open');
  if (obStep === 3) renderOnboarding();
  else renderSettings();
}

function openCatModal(idx) {
  editingCatIdx = idx !== undefined ? idx : null;
  const cat = idx !== undefined ? (userConfig||obData).categorias[idx] : null;
  document.getElementById('inp-cat-emoji').value  = cat ? cat.e : '';
  document.getElementById('inp-cat-nombre').value = cat ? cat.l : '';
  document.getElementById('inp-cat-limite').value = cat ? (cat.b||'') : '';
  document.getElementById('modal-cat').classList.add('open');
}

function saveCat() {
  const e = document.getElementById('inp-cat-emoji').value.trim();
  const l = document.getElementById('inp-cat-nombre').value.trim();
  const b = parseFloat(document.getElementById('inp-cat-limite').value) || 0;
  if (!e) { showToast('El emoji es obligatorio'); return; }
  if (!l) { showToast('Ingresa un nombre'); return; }
  const cat = { id: l.toLowerCase().replace(/\s+/g,'_')+Date.now(), e, l, b, active: true };
  const data = userConfig || obData;
  if (editingCatIdx !== null) data.categorias[editingCatIdx] = { ...data.categorias[editingCatIdx], ...cat };
  else data.categorias.push(cat);
  document.getElementById('modal-cat').classList.remove('open');
  if (obStep === 4) renderOnboarding();
  else { buildCatGridModal(); renderSettings(); }
}

async function loadData() {
  const isCasa = currentAcct === 'casa';
  const quien  = isCasa ? null : (userConfig?.nombre || currentUser?.name);

  document.getElementById('gastos-list').innerHTML = `<div class="loading-state"><span class="loading-spin">🐷</span>Cargando...</div>`;

  if (!isOnline) {
    gastosMes = gq(currentAcct).map(g=>({...g,_pending:true}));
    budgets   = {};
    getCats().forEach(c => { budgets[c.id] = c.b||0; });
    renderAll(); updateSummary(); return;
  }

  try {
    const mes = getMesNombre();
    const userId = isCasa ? 'casa' : currentAcct;
    const [gRes, bRes] = await Promise.all([
      fetchGet(`action=getGastos&mes=${encodeURIComponent(mes)}&userId=${userId}`),
      fetchGet(`action=getBudget&mes=${encodeURIComponent(mes)}&userId=${userId}`)
    ]);

    let gastos = gRes.ok ? gRes.gastos : [];
    if (isCasa && currentUser) {
      // Casa: mostrar gastos del usuario actual solamente
      gastos = gastos.filter(g => {
        if (currentUser.email === 'fabriciouriasg@gmail.com') return g.quien !== 'Vanessa';
        if (currentUser.email === 'vanessav2122@gmail.com')   return true;
        return true;
      });
    }

    budgets = bRes.ok ? bRes.budgets : {};
    getCats().forEach(c => { if(!budgets[c.id]) budgets[c.id] = c.b||0; });

    const pending = gq(currentAcct);
    gastosMes = [
      ...pending.map(g=>({rowIndex:null,fecha:g.fecha,categoria:g.category,monto:g.amount,quien:g.quien,nota:g.nota,_pending:true})),
      ...gastos
    ];
  } catch(e) {
    showToast('Error al cargar datos');
    gastosMes = [];
  }

  renderAll(); updateSummary();
}

function getCats() {
  if (currentAcct === 'casa') return DEFAULT_CATS;
  return userConfig?.categorias?.filter(c=>c.active!==false) || DEFAULT_CATS;
}

function getCatById(id) {
  return getCats().find(c=>c.id===id) || {e:'📌',l:id,b:0};
}

// ============================================================
// SUMMARY
// ============================================================
function updateSummary() {
  const totalVar = gastosMes.filter(g=>!g._fixed).reduce((s,g)=>s+(g.monto||0),0);
  const totalFijos = (userConfig?.fijos||DEFAULT_FIJOS).reduce((s,f)=>s+(f.monto||0),0);
  const ingreso = userConfig?.ingreso || 44500;
  const disp = ingreso - totalFijos - totalVar;

  document.getElementById('sum-total').textContent = fmxn(totalVar);
  document.getElementById('sum-fijos').textContent = fmxn(totalFijos);
  document.getElementById('sum-disp').textContent  = fmxn(Math.max(disp,0));
  document.getElementById('sum-disp').className    = 'sc-value ' + (disp >= 0 ? 'green' : 'warn');

  const q = gq(currentAcct);
  const pb = document.getElementById('pending-banner');
  if (q.length) {
    pb.classList.add('show');
    document.getElementById('pending-text').textContent = `${q.length} gasto${q.length>1?'s':''} pendiente${q.length>1?'s':''} de sincronizar`;
  } else pb.classList.remove('show');
}

function switchTab(t) {

// ── Gastos ──
function rGastos() {
  const el = document.getElementById('gastos-list');
  if (!gastosMes.length) { el.innerHTML=`<div class="empty-state"><div class="es-emoji">🐷</div><div class="es-text">Sin gastos este mes.<br>Toca + para registrar.</div></div>`; return; }
  const sorted = [...gastosMes].sort((a,b)=>b.fecha>a.fecha?1:-1);
  const groups = {};
  sorted.forEach(e=>{
    const d=new Date(e.fecha+'T12:00:00');
    if(!groups[e.fecha]) groups[e.fecha]={label:fday(d),items:[]};
    groups[e.fecha].items.push(e);
  });
  el.innerHTML = Object.entries(groups).sort((a,b)=>b[0]>a[0]?1:-1).map(([,g])=>`
    <div class="expense-group">
      <div class="eg-header">${g.label}</div>
      ${g.items.map(e=>rItem(e)).join('')}
    </div>`).join('');
}

function rItem(e) {
  const c = getCatById(e.categoria);
  return `<div class="expense-item${e._pending?' pending-sync':''}">
    <div class="ei-icon">${c.e}</div>
    <div class="ei-info">
      <div class="ei-desc">${e.nota||e.categoria}</div>
      <div class="ei-meta">${c.l}${e.quien?' · '+e.quien:''}</div>
    </div>
    <div class="ei-amount">${fmxn(e.monto)}</div>
    ${e._pending?'<div class="sync-dot"></div>':''}
  </div>`;
}

// ── Categorías ──
function rCats() {
  const el = document.getElementById('cat-breakdown');
  const totals = {};
  gastosMes.forEach(e=>{ totals[e.categoria]=(totals[e.categoria]||0)+e.monto; });
  const cats = getCats();
  if (!cats.length) { el.innerHTML=`<div class="empty-state"><div class="es-emoji">📊</div><div class="es-text">Sin categorías.</div></div>`; return; }
  el.innerHTML = cats.map(c=>{
    const spent=totals[c.id]||0;
    const lim=budgets[c.id]||c.b||0;
    const pct=lim>0?Math.min((spent/lim)*100,100):0;
    const fc=pct>=100?'over':pct>=80?'warn':'';
    return `<div class="cp-item">
      <div class="cp-header">
        <span>${c.e} ${c.l}</span>
        <span style="color:var(--muted);font-family:'Helvetica Neue',sans-serif">${fmxn(spent)}${lim>0?' / '+fmxn(lim):''}</span>
      </div>
      ${lim>0?`<div class="pb-track"><div class="pb-fill ${fc}" style="width:${pct.toFixed(1)}%"></div></div>`:''}
    </div>`;
  }).join('');
}

// ── Historial ──
function rHist() {
  const el = document.getElementById('historial-list');
  if (!gastosMes.length) { el.innerHTML=`<div class="empty-state"><div class="es-emoji">📋</div><div class="es-text">Sin historial.</div></div>`; return; }
  const groups={};
  [...gastosMes].sort((a,b)=>b.fecha>a.fecha?1:-1).forEach(e=>{
    const d=new Date(e.fecha+'T12:00:00');
    const wk=`S${Math.ceil(d.getDate()/7)} — ${MONTHS[d.getMonth()].substr(0,3)}`;
    if(!groups[wk])groups[wk]={label:wk,items:[],total:0};
    groups[wk].items.push(e); groups[wk].total+=e.monto;
  });
  el.innerHTML=Object.values(groups).map(g=>`
    <div class="expense-group">
      <div class="eg-header">${g.label} · ${fmxn(g.total)}</div>
      ${g.items.map(e=>rItem(e)).join('')}
    </div>`).join('');
}

function closeGastoModal(){document.getElementById('modal-gasto').classList.remove('open');}

async function submitGasto(){
  const amount=parseFloat(document.getElementById('inp-amount').value);
  const desc  =document.getElementById('inp-desc').value.trim();
  const note  =document.getElementById('inp-note').value.trim();
  const fecha =document.getElementById('inp-fecha').value;
  const catEl =document.querySelector('.cat-chip-m.selected');
  if(!amount||amount<=0){showToast('Ingresa un monto válido');return;}
  if(!desc){showToast('Agrega una descripción');return;}
  if(!catEl){showToast('Selecciona una categoría');return;}
  if(!fecha){showToast('Selecciona una fecha');return;}

  const isCasa = currentAcct==='casa';
  const quien  = isCasa ? (currentUser?.email==='vanessav2122@gmail.com' ? 'Vanessa' : 'Fabricio') : (userConfig?.nombre||currentUser?.name||'Usuario');

  const gasto = {
    localId:  uid(),
    account:  currentAcct,
    amount,
    categoria: catEl.dataset.cat,
    fecha,
    quien,
    nota: desc + (note ? ' · '+note : ''),
    nota_display: desc,
    note,
    userId: isCasa ? 'casa' : currentAcct
  };

  const btn=document.getElementById('btn-submit-gasto');
  btn.disabled=true; btn.textContent='Guardando...';

  if(!isOnline){
    const q=gq(currentAcct);q.push(gasto);sq(currentAcct,q);
    showToast('Guardado offline 🟡');
    closeGastoModal(); updateBadges();
    gastosMes.unshift({rowIndex:null,fecha,categoria:gasto.categoria,monto:amount,quien,nota:gasto.nota,_pending:true});
    updateSummary(); renderAll();
  } else {
    try {
      const res = await postAPI({
        action:'registrarGasto', token:TOKEN,
        fecha, categoria:gasto.categoria, monto:amount,
        quien, nota:gasto.nota, userId:gasto.userId
      });
      if(res.ok){ showToast('Gasto registrado ✓'); closeGastoModal(); await loadData(); }
      else { const q=gq(currentAcct);q.push(gasto);sq(currentAcct,q); showToast('Error — guardado offline 🟡'); closeGastoModal(); updateBadges(); }
    } catch(e) {
      const q=gq(currentAcct);q.push(gasto);sq(currentAcct,q);
      showToast('Sin conexión — guardado offline 🟡'); closeGastoModal(); updateBadges();
    }
  }
  playSuccess();
}

async function flushQueue(acct) {
  const q=gq(acct);
  if(!q.length||!isOnline)return;
  try {
    const res=await postAPI({action:'registrarBatch',token:TOKEN,gastos:q.map(g=>({...g,localId:g.localId||uid()}))});
    if(res.ok){
      sq(acct,[]);
      showToast(`${q.length} gasto${q.length>1?'s':''} sincronizado${q.length>1?'s':''} ✓`);
      updateBadges();
      if(currentAcct===acct) await loadData();
    }
  } catch(e){}
}

      <div class="theme-grid-s" id="theme-grid-s">
        ${THEMES.map(t=>`
          <div class="theme-card-s${t.id===tema?' sel':''}" onclick="selectThemeSettings('${t.id}')">
            <div class="tc-swatches-s">${t.swatches.map(c=>`<div class="tc-swatch-s" style="background:${c}"></div>`).join('')}</div>
            <div class="tc-body-s"><div class="tc-name-s">${t.name}</div></div>
          </div>`).join('')}
      </div>
    </div>
    ${currentAcct!=='casa'?`
    <div class="settings-section" style="border-top:1px solid var(--border)">
      <div class="settings-title">Gastos fijos</div>
      <div class="chip-grid">
        ${(cfg.fijos||[]).map((f,i)=>`
          <div class="chip-big active" onclick="openFijoModal(${i})">
            <span class="ce">${f.e}</span><span class="cn">${f.l}</span><span class="ca">${fmxn(f.monto)}</span>
          </div>`).join('')}
        <div class="chip-big chip-add" onclick="openFijoModal()"><span class="ce">＋</span><span class="cn">Agregar</span></div>
      </div>
    </div>
    <div class="settings-section" style="border-top:1px solid var(--border)">
      <div class="settings-title">Categorías</div>
      <div class="chip-grid">
        ${(cfg.categorias||[]).map((c,i)=>`
          <div class="chip-big${c.active!==false?' active':''}" onclick="toggleCat(${i})">
            <span class="ce">${c.e}</span><span class="cn">${c.l}</span><span class="ca">${c.b>0?fmxn(c.b):'—'}</span>
          </div>`).join('')}
        <div class="chip-big chip-add" onclick="openCatModal()"><span class="ce">＋</span><span class="cn">Nueva</span></div>
      </div>
    </div>`:``}
  `;
}

function selectThemeSettings(id){
  applyTheme(id);
  if(userConfig){ userConfig.tema=id; sls('config_'+currentUser.email,userConfig); }
  renderSettings();
  if(isOnline&&userConfig) postAPI({action:'saveConfig',token:TOKEN,...userConfig,userId:currentUser.email}).catch(()=>{});
}

function toggleCat(i){
  if(!userConfig)return;
  const cat=userConfig.categorias[i];
  const hasGastos=gastosMes.some(g=>g.categoria===cat.id);
  if(hasGastos&&cat.active!==false){showToast('No puedes desactivar una categoría con gastos este mes');return;}
  cat.active=!cat.active;
  sls('config_'+currentUser.email,userConfig);
  renderSettings(); buildCatGridModal();
}

async function fetchGet(params){ const r=await fetch(`${SCRIPT_URL}?${params}`); return r.json(); }
async function postAPI(body){ const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(body)}); return r.json(); }

// ============================================================
// SCREEN NAV
// ============================================================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
}

// ── Cerrar modales al click fuera
['modal-gasto','modal-cat','modal-fijo'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

// ============================================================
// AUDIO
// ============================================================
let _ac;
const getAC=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;};
function playTone(notes,vol,type){try{const ctx=getAC();let t=ctx.currentTime;notes.forEach(([f,d])=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type||'square';o.frequency.value=f;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.start(t);o.stop(t+d);t+=d*0.85;});}catch(e){}}
function playSuccess(){playTone([[523,.08],[659,.08],[784,.08],[1047,.15]],.3,'square');}

// ============================================================
// TOAST
// ============================================================
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// INIT
// ============================================================
setOnline(navigator.onLine);
applyTheme('mayne');

// Restaurar sesión
const savedUser = gls('user');
if(savedUser){ currentUser=savedUser; afterLogin(); }

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
