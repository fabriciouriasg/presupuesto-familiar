<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2A5C1F">
<meta name="description" content="Control de gastos en tiempo real para Fabricio y Vanessa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gastos">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%232A5C1F' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='white' text-anchor='middle' dominant-baseline='middle' font-family='system-ui' font-weight='bold'>💰</text></svg>">
<title>Gastos · Presupuesto Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F4F2EE;
  --surface:  #FFFFFF;
  --border:   #E0DDD7;
  --text:     #18160F;
  --text2:    #7A7670;
  --text3:    #B0ADA7;
  --green:    #2A5C1F;
  --green-bg: #EBF4E7;
  --green-mid:#3D8A2D;
  --red:      #7C1D1D;
  --red-bg:   #FCEAEA;
  --amber:    #7A4500;
  --amber-bg: #FFF3DC;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
}

.topbar {
  width: 100%;
  background: var(--green);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.topbar-title { font-size: 15px; font-weight: 500; letter-spacing: -.01em; }
.topbar-sub   { font-size: 11px; opacity: .65; margin-top: 1px; }

.who-toggle { display: flex; gap: 6px; }
.who-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.3);
  background: transparent;
  color: rgba(255,255,255,.7);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.who-btn.active {
  background: rgba(255,255,255,.2);
  color: #fff;
  border-color: rgba(255,255,255,.6);
  font-weight: 500;
}

.card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 20px;
  margin: 0 16px;
}

.monto-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.monto-wrap {
  display: flex;
  align-items: baseline;
  gap: 4px;
  border-bottom: 2px solid var(--border);
  padding-bottom: 12px;
  margin-bottom: 20px;
  transition: border-color .2s;
}
.monto-wrap:focus-within { border-color: var(--green-mid); }
.monto-prefix { font-size: 28px; font-weight: 300; color: var(--text2); font-family: 'DM Mono', monospace; }
.monto-input {
  font-size: 42px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  width: 100%;
  min-width: 0;
  letter-spacing: -.02em;
}
.monto-input::placeholder { color: var(--text3); }

.field-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
.cat-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  padding: 11px 12px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all .12s;
  text-align: left;
  line-height: 1.3;
}
.cat-btn:hover { border-color: #B5C9B0; background: #F0F5EE; }
.cat-btn.selected {
  border-color: var(--green-mid);
  background: var(--green-bg);
  color: var(--green);
  font-weight: 500;
}
.cat-content { display: flex; align-items: center; gap: 8px; width: 100%; }
.cat-icon { font-size: 18px; flex-shrink: 0; }
.cat-name { flex: 1; }
.cat-remaining {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text3);
  opacity: .7;
  margin-top: 2px;
  font-family: 'DM Mono', monospace;
}
.cat-btn.selected .cat-remaining { opacity: 1; color: var(--green); }

.tags-section {
  display: none;
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.tags-section.show { display: block; }
.tags-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.tags-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag-btn {
  padding: 7px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--bg);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.tag-btn:hover { border-color: var(--green-mid); background: var(--green-bg); color: var(--green); }
.tag-btn.selected {
  border-color: var(--green-mid);
  background: var(--green-mid);
  color: #fff;
  font-weight: 500;
}

.fecha-row { display: flex; gap: 8px; margin-bottom: 20px; }
.fecha-input, .nota-input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.fecha-input:focus, .nota-input:focus { border-color: var(--green-mid); background: #fff; }
.nota-input { margin-bottom: 20px; }
.nota-input::placeholder { color: var(--text3); }

.submit-btn {
  width: 100%;
  padding: 15px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: -.01em;
}
.submit-btn:hover  { background: var(--green-mid); }
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.status {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  display: none;
  line-height: 1.4;
}
.status.ok     { background: var(--green-bg); color: var(--green); display: block; }
.status.error  { background: var(--red-bg);   color: var(--red);   display: block; }
.status.loading{ background: var(--amber-bg); color: var(--amber); display: block; }

.log-section { width: 100%; max-width: 480px; margin: 20px 16px 0; }
.log-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  padding: 0 4px;
}
.log-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
.log-left  { display: flex; flex-direction: column; gap: 2px; }
.log-cat   { font-size: 13px; font-weight: 500; }
.log-meta  { font-size: 11px; color: var(--text2); }
.log-monto { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--green); }

.config-fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  z-index: 50;
}
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 480px;
  position: relative;
}
.modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.modal p  { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }
.modal input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text);
  outline: none;
  margin-bottom: 12px;
  background: var(--bg);
}
.modal input:focus { border-color: var(--green-mid); background: #fff; }
.modal-save {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text2); }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">💰 Presupuesto Familiar</div>
    <div class="topbar-sub">Mayo – Agosto 2026</div>
  </div>
  <div class="who-toggle">
    <button class="who-btn active" onclick="setQuien('Fabricio', this)">Fabricio</button>
    <button class="who-btn" onclick="setQuien('Vanessa', this)">Vanessa</button>
  </div>
</div>

<div class="card">
  <div class="monto-label">¿Cuánto gastaste?</div>
  <div class="monto-wrap">
    <span class="monto-prefix">$</span>
    <input class="monto-input" id="monto" type="number" inputmode="decimal" placeholder="0" min="0" step="0.01">
  </div>

  <div class="field-label">Categoría</div>
  <div class="cat-grid">
    <button class="cat-btn" onclick="selectCat('despensa', this)">
      <div class="cat-content"><span class="cat-icon">🛒</span><span class="cat-name">Despensa / hogar</span></div>
      <span class="cat-remaining" data-cat="despensa">—</span>
    </button>
    <button class="cat-btn" onclick="selectCat('gasolina', this)">
      <div class="cat-content"><span class="cat-icon">⛽</span><span class="cat-name">Gasolina / Uber</span></div>
      <span class="cat-remaining" data-cat="gasolina">—</span>
    </button>
    <button class="cat-btn" onclick="selectCat('salidas', this)">
      <div class="cat-content"><span class="cat-icon">🍽️</span><span class="cat-name">Salidas y comida</span></div>
      <span class="cat-remaining" data-cat="salidas">—</span>
    </button>
    <button class="cat-btn" onclick="selectCat('amazon', this)">
      <div class="cat-content"><span class="cat-icon">📦</span><span class="cat-name">Amazon / compras</span></div>
      <span class="cat-remaining" data-cat="amazon">—</span>
    </button>
    <button class="cat-btn" onclick="selectCat('ropa', this)">
      <div class="cat-content"><span class="cat-icon">👗</span><span class="cat-name">Ropa / personal</span></div>
      <span class="cat-remaining" data-cat="ropa">—</span>
    </button>
    <button class="cat-btn" onclick="selectCat('ahorro', this)">
      <div class="cat-content"><span class="cat-icon">🏦</span><span class="cat-name">Ahorro / INFONAVIT</span></div>
      <span class="cat-remaining" data-cat="ahorro">—</span>
    </button>
    <button class="cat-btn" onclick="selectCat('buffer', this)" style="grid-column: span 2;">
      <div class="cat-content"><span class="cat-icon">🔧</span><span class="cat-name">Buffer / imprevistos</span></div>
      <span class="cat-remaining" data-cat="buffer">—</span>
    </button>
  </div>

  <div class="tags-section" id="tags-section">
    <div class="tags-label" id="tags-label">Sugerencias</div>
    <div class="tags-grid" id="tags-grid"></div>
  </div>

  <div class="field-label">Fecha del gasto</div>
  <div class="fecha-row">
    <input class="fecha-input" id="fecha" type="date">
  </div>

  <input class="nota-input" id="nota" type="text" placeholder="Nota opcional (ej: súper Chedraui)">

  <button class="submit-btn" id="submit-btn" onclick="enviarGasto()">Registrar gasto</button>

  <div class="status" id="status"></div>
</div>

<div class="log-section">
  <div class="log-title">Últimos registros</div>
  <div id="log-list"></div>
</div>

<div class="config-fab" onclick="openModal()" title="Configurar URL del script">⚙️</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2>Configuración</h2>
    <p>Pega aquí la URL del Web App de Google Apps Script.</p>
    <input id="script-url" type="url" placeholder="https://script.google.com/macros/s/AKfycb.../exec">
    <button class="modal-save" onclick="saveConfig()">Guardar y cerrar</button>
  </div>
</div>

<script>
// ── Registrar Service Worker ──────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(err => {
    console.log('Service Worker registration failed:', err);
  });
}

// ── Solicitar notificaciones ──────────────────────────────
if ('Notification' in window && Notification.permission === 'default') {
  setTimeout(() => {
    Notification.requestPermission();
  }, 2000);
}

// ── Estado ──────────────────────────────────────────────────
let selectedCat = null;
let quien = 'Fabricio';
let budgetData = {};
let lastGastos = {};

const TAGS = {
  gasolina: ['Pemex', 'Shell', 'BP', 'Oxxo Gas', 'Uber'],
  despensa: ['Walmart', 'Costco', 'Carniceria', 'Oxxo', 'Tienda', 'Tortilleria', 'Cremeria'],
  salidas: ['Cine', 'Café', 'Restaurante', 'Bar', 'Tacos', 'Fast Food'],
  amazon: ['Casa', 'Regalo'],
  ropa: ['Zara', 'H&M', 'Calzado'],
  ahorro: ['Buffer'],
  buffer: ['Mascotas', 'Casa', 'Emergencias']
};

const CATS = {
  despensa: { name: 'Despensa / hogar', limit: 6000 },
  gasolina: { name: 'Gasolina / Uber', limit: 3000 },
  salidas:  { name: 'Salidas y comida', limit: 5700 },
  amazon:   { name: 'Amazon / compras', limit: 1500 },
  ropa:     { name: 'Ropa / personal', limit: 500 },
  ahorro:   { name: 'Ahorro / INFONAVIT', limit: 3020 },
  buffer:   { name: 'Buffer / imprevistos', limit: 1500 },
};

// ── Init ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm   = String(today.getMonth() + 1).padStart(2, '0');
  const dd   = String(today.getDate()).padStart(2, '0');
  document.getElementById('fecha').value = `${yyyy}-${mm}-${dd}`;

  const url = localStorage.getItem('script_url');
  if (url) document.getElementById('script-url').value = url;
  if (!url) setTimeout(openModal, 600);

  renderLog();
  loadBudgetData();
  
  // Polling cada 30 segundos
  setInterval(checkForNewGastos, 30000);
});

// ── Cargar datos de presupuesto ──────────────────────────
async function loadBudgetData() {
  try {
    const fechaInput = document.getElementById('fecha').value;
    const mes = getMesFromFecha(fechaInput);
    const url = localStorage.getItem('script_url');
    if (!url) return;
    
    const response = await fetch(url + '?action=getBudget&mes=' + mes, {
      method: 'GET'
    });
    
    const data = await response.json();
    if (data.ok) {
      budgetData = data.budgets || {};
      updateRemainingBadges();
    }
  } catch (err) {
    console.log('Error cargando presupuesto');
  }
}

// ── Polling cada 30 segundos ──────────────────────────────
async function checkForNewGastos() {
  try {
    const url = localStorage.getItem('script_url');
    if (!url) return;
    
    const response = await fetch(url + '?action=getLastGasto', {
      method: 'GET'
    });
    
    const data = await response.json();
    if (data.ok && data.lastGasto) {
      const gastoKey = JSON.stringify(data.lastGasto);
      const lastKey = localStorage.getItem('last_gasto_key');
      
      if (gastoKey !== lastKey) {
        localStorage.setItem('last_gasto_key', gastoKey);
        const { categoria, monto, quien: gastoQuien, fecha } = data.lastGasto;
        const catName = CATS[categoria]?.name || categoria;
        
        // Notificación
        const title = `${gastoQuien} gastó $${monto}`;
        const options = {
          body: `${catName} • ${fecha}`,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect fill="%232A5C1F" width="192" height="192"/><text x="50%" y="50%" font-size="120" fill="white" text-anchor="middle" dominant-baseline="middle" font-family="system-ui" font-weight="bold">💰</text></svg>',
          badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"><circle fill="%232A5C1F" cx="48" cy="48" r="48"/><text x="50%" y="50%" font-size="60" fill="white" text-anchor="middle" dominant-baseline="middle">💰</text></svg>',
          tag: 'gasto-notif',
          requireInteraction: false
        };
        
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification(title, options);
        }
        
        // Sonido + vibración
        try { navigator.vibrate([200, 100, 200]); } catch(e) {}
        playNotificationSound();
        
        // Recargar datos
        loadBudgetData();
        renderLog();
      }
    }
  } catch (err) {
    console.log('Error en polling:', err);
  }
}

function playNotificationSound() {
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioContext.createOscillator();
  const gainNode = audioContext.createGain();
  
  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);
  
  oscillator.frequency.value = 800;
  oscillator.type = 'sine';
  
  gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
  
  oscillator.start(audioContext.currentTime);
  oscillator.stop(audioContext.currentTime + 0.2);
}

function getMesFromFecha(fecha) {
  if (!fecha) return 'Mayo';
  const [yyyy, mm, dd] = fecha.split('-');
  const month = parseInt(mm);
  if (month === 5) return 'Mayo';
  if (month === 6) return 'Junio';
  if (month === 7) return 'Julio';
  if (month === 8) return 'Agosto';
  return 'Mayo';
}

function updateRemainingBadges() {
  for (const cat of Object.keys(CATS)) {
    const spent = budgetData[cat] || 0;
    const remaining = CATS[cat].limit - spent;
    const badge = document.querySelector(`[data-cat="${cat}"]`);
    if (badge) {
      badge.textContent = remaining >= 0 ? `Disponible: $${remaining.toLocaleString('es-MX')}` : `Excedido: -$${Math.abs(remaining).toLocaleString('es-MX')}`;
    }
  }
}

// ── Quién ────────────────────────────────────────────────────
function setQuien(nombre, btn) {
  quien = nombre;
  document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Categoría y tags ──────────────────────────────────────────
function selectCat(id, btn) {
  selectedCat = id;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  renderTags(id);
}

function renderTags(catId) {
  const section = document.getElementById('tags-section');
  const grid = document.getElementById('tags-grid');
  const tagsForCat = TAGS[catId];
  
  if (!tagsForCat || tagsForCat.length === 0) {
    section.classList.remove('show');
    return;
  }
  
  section.classList.add('show');
  grid.innerHTML = tagsForCat.map(tag => 
    `<button class="tag-btn" onclick="selectTag('${tag}', this)">${tag}</button>`
  ).join('');
}

function selectTag(tag, btn) {
  document.getElementById('nota').value = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ── Envío ────────────────────────────────────────────────────
async function enviarGasto() {
  const monto = parseFloat(document.getElementById('monto').value);
  const fecha = document.getElementById('fecha').value;
  const nota  = document.getElementById('nota').value.trim();
  const url   = localStorage.getItem('script_url');

  if (!url) { showStatus('Primero configura la URL del script (botón ⚙️)', 'error'); return; }
  if (!monto || monto <= 0) { showStatus('Ingresa un monto válido', 'error'); return; }
  if (!selectedCat) { showStatus('Selecciona una categoría', 'error'); return; }
  if (!fecha) { showStatus('Ingresa la fecha', 'error'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showStatus('Registrando...', 'loading');

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ fecha, categoria: selectedCat, monto, quien, nota, token: "Theend.01" }),
    });

    const data = await resp.json();

    if (data.ok) {
      showStatus(data.mensaje, 'ok');
      addLog({ fecha, cat: selectedCat, monto, quien });
      limpiarForm();
      setTimeout(loadBudgetData, 500);
    } else {
      showStatus('Error: ' + (data.error || 'Respuesta inesperada'), 'error');
    }
  } catch (err) {
    showStatus('No se pudo conectar. Verifica la URL del script y tu conexión.', 'error');
  }

  btn.disabled = false;
}

function limpiarForm() {
  document.getElementById('monto').value = '';
  document.getElementById('nota').value  = '';
  selectedCat = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('tags-section').classList.remove('show');
}

// ── Status feedback ──────────────────────────────────────────
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

// ── Log local ────────────────────────────────────────────────
function addLog(entry) {
  const logs = getLog();
  logs.unshift(entry);
  localStorage.setItem('gasto_log', JSON.stringify(logs.slice(0, 20)));
  renderLog();
}

function getLog() {
  try { return JSON.parse(localStorage.getItem('gasto_log')) || []; }
  catch(e) { return []; }
}

function renderLog() {
  const logs = getLog();
  const el = document.getElementById('log-list');
  if (!logs.length) { el.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:4px">Sin registros aún.</div>'; return; }
  el.innerHTML = logs.slice(0, 5).map(l => `
    <div class="log-item">
      <div class="log-left">
        <span class="log-cat">${CATS[l.cat].name || l.cat}</span>
        <span class="log-meta">${l.fecha} · ${l.quien}</span>
      </div>
      <span class="log-monto">$${parseFloat(l.monto).toLocaleString('es-MX')}</span>
    </div>
  `).join('');
}

// ── Config modal ──────────────────────────────────────────────
function openModal()  { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function saveConfig() {
  const url = document.getElementById('script-url').value.trim();
  if (!url) { alert('Pega la URL del script primero'); return; }
  localStorage.setItem('script_url', url);
  closeModal();
  showStatus('URL configurada correctamente ✓', 'ok');
}

document.addEventListener('DOMContentLoaded', () => {
  const fechaInput = document.getElementById('fecha');
  if (fechaInput) {
    fechaInput.addEventListener('change', loadBudgetData);
  }
});
</script>
</body>
</html>
